  ns.position.y = 2.1; ns.scale.set(1.5, 0.4, 1); g.add(ns);

  // 标记所有身体部件
  g.traverse(c => { if (c.isMesh) { c.userData.isPlayerBody = true; c.userData.playerId = playerId; } });

  g.position.y = 0;
  g.visible = false;
  scene.add(g);
  return g;
}

function connectWebSocket(url, hostMode) {
  return new Promise((resolve, reject) => {
    try {
      const socket = new WebSocket(url);
      let connected = false;
      const timeout = setTimeout(() => {
        if (!connected) {
          updateConnStatus('连接超时！请确认服务器已启动且IP正确', 'error');
          reject(new Error('timeout'));
        }
      }, 8000);
      socket.onopen = () => {
        connected = true;
        clearTimeout(timeout);
        ws = socket;
        isMultiplayer = true;
        isHost = hostMode;
        updateConnStatus('已连接', 'connected');
        if (hostMode) document.getElementById('join-btn').disabled = true;
        resolve(socket);
      };
      socket.onmessage = (e) => handleNetworkMessage(e.data);
      socket.onclose = () => {
        if (gameRunning) {
          ws = null;
          updateConnStatus('连接断开', 'error');
        }
      };
      socket.onerror = () => {
        if (!connected) {
          clearTimeout(timeout);
          updateConnStatus('连接失败！检查 IP 和端口是否正确', 'error');
          reject(new Error('WebSocket error'));
        }
      };
    } catch(e) {
      updateConnStatus('连接失败', 'error');
      reject(e);
    }
  });
}

function handleNetworkMessage(raw) {
  try {
    const msg = JSON.parse(raw);
    switch (msg.type) {
      case 'welcome':
        myPlayerId = msg.id;
        break;
      case 'player_joined':
        if (!remotePlayers.has(msg.id) && msg.id !== myPlayerId) {
          const mesh = createRemotePlayerMesh(msg.id);
          mesh.visible = true;
          remotePlayers.set(msg.id, {
            mesh,
            pos: new THREE.Vector3(0, 0, 0),
            yaw: 0,
            weapon: 'gun',
            hp: 100,
            targetPos: new THREE.Vector3(0, 0, 0),
            targetYaw: 0,
            playerId: msg.id,
          });
        }
        break;
      case 'player_left':
        if (remotePlayers.has(msg.id)) {
          const rp = remotePlayers.get(msg.id);
          scene.remove(rp.mesh);
          disposeMesh(rp.mesh);
          remotePlayers.delete(msg.id);
        }
        break;
      case 'pos':
        if (remotePlayers.has(msg.from)) {
          const rp = remotePlayers.get(msg.from);
          rp.targetPos.set(msg.x, msg.y, msg.z);
          rp.targetYaw = msg.yaw;
          rp.weapon = msg.weapon || 'gun';
        }
        break;
      case 'shoot':
        if (remotePlayers.has(msg.from)) {
          const origin = new THREE.Vector3(msg.ox, msg.oy, msg.oz);
          const dir = new THREE.Vector3(msg.dx, msg.dy, msg.dz);
          // 从远程玩家位置发出弹线
          const far = origin.clone().add(dir.clone().multiplyScalar(50));
          createBulletTrail(origin, far);
          playSound(180, 'square', 0.05, 0.06, 60);
          if (msg.hitEnemy && isHost) {
            // host 收到客户端命中，验证并处理
            for (const enemy of enemies) {
              if (!enemy.dead && enemy.mesh.position.distanceTo(new THREE.Vector3(msg.hitX, msg.hitY, msg.hitZ)) < 2) {
                damageEnemy(enemy, msg.dmg || BULLET_DAMAGE);
                break;
              }
            }
          }
        }
        break;
      case 'knife':
        if (remotePlayers.has(msg.from)) {
          playSound(200, 'sawtooth', 0.08, 0.1, 40);
          if (msg.hitEnemy && isHost) {
            for (const enemy of enemies) {
              if (!enemy.dead && enemy.mesh.position.distanceTo(new THREE.Vector3(msg.hitX, msg.hitY, msg.hitZ)) < 2) {
                damageEnemy(enemy, msg.dmg || KNIFE_DAMAGE);
                break;
              }
            }
          }
        }
        break;
      case 'enemy_spawn':
        if (!isHost) {
          spawnEnemyDirect(msg.enemyType, msg.enemyId, msg.x, msg.y, msg.z, msg.hp, msg.maxHp);
        }
        break;
      case 'hp_sync':
        if (remotePlayers.has(msg.from)) {
          remotePlayers.get(msg.from).hp = msg.hp;
          updateUI();
        }
        break;
      case 'player_hit':
        if (msg.target === myPlayerId) {
          damagePlayer(msg.dmg || BULLET_DAMAGE);
          if (msg.isHeadshot) addKillMessage('被爆头了!', 0);
        }
        break;
      case 'wave_start':
        if (!isHost) {
          waveNumber = msg.wave;
          waveActive = true;
          showScreenMsg(`第 ${msg.wave} 波 开始！`, '#ffcc00');
        }
        break;
      case 'enemy_pos':
        if (!isHost) {
          for (const enemy of enemies) {
            if (!enemy.dead && enemy.mesh.userData.netId === msg.enemyId) {
              enemy.mesh.position.set(msg.x, msg.y, msg.z);
              if (msg.ry !== undefined) enemy.mesh.rotation.y = msg.ry;
              enemy.hp = msg.hp;
              break;
            }
          }
        }
        break;
      case 'enemy_damage':
      case 'enemy_death':
        if (!isHost) {
          // 客户端接收敌人状态
          pendingEnemyState.push(msg);
        }
        break;
      case 'full_state':
        if (!isHost) {
          applyFullState(msg);
        }
        break;
      case 'damage':
        if (remotePlayers.has(msg.from)) {
          remotePlayers.get(msg.from).hp = msg.hp;
        }
        break;
    }
  } catch(e) {}
}

function sendNetMessage(msg) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  try { ws.send(JSON.stringify(msg)); } catch(e) {}
}

function sendFullState(targetId) {
  const state = {
    type: 'full_state',
    to: targetId,
    wave: waveNumber,
    enemiesRemaining: enemiesRemaining + spawnQueue.length,
    enemies: enemies.filter(e => !e.dead).map(e => ({
      id: e.mesh.userData.netId,
      type: e.type,
      x: e.mesh.position.x, y: e.mesh.position.y, z: e.mesh.position.z,
      ry: e.mesh.rotation.y,
      hp: e.hp, maxHp: e.maxHp,
    })),
  };
  if (targetId) {
    // send directly to specific player
    state.type = 'full_state';
    sendNetMessage(state);
  } else {
    sendNetMessage(state);
  }
}

function applyFullState(state) {
  // 清除本地敌人
  for (const enemy of enemies) {
    scene.remove(enemy.mesh);
    disposeMesh(enemy.mesh);
  }
  enemies.length = 0;
  spawnQueue = [];

  // 重建敌人
  if (state.enemies) {
    for (const ed of state.enemies) {
      const enemy = spawnEnemyDirect(ed.type, ed.id, ed.x, ed.y, ed.z, ed.hp, ed.maxHp);
    }
  }
  enemiesRemaining = state.enemiesRemaining || 0;
  waveNumber = state.wave || 1;
  waveActive = true;
}

function syncNetwork(dt) {
  if (!isMultiplayer) return;

  netSyncTimer -= dt;
  if (netSyncTimer <= 0) {
    netSyncTimer = NET_SYNC_RATE;
    // 发送自己的位置
    sendNetMessage({
      type: 'pos',
      x: camera.position.x, y: camera.position.y, z: camera.position.z,
      yaw: yaw, pitch: pitch,
      weapon: currentWeapon,
    });

    // 主机同步所有敌人位置给客户端
    if (isHost) {
      for (const enemy of enemies) {
        if (!enemy.dead) {
          sendNetMessage({
            type: 'enemy_pos',
            enemyId: enemy.mesh.userData.netId,
            x: enemy.mesh.position.x, y: enemy.mesh.position.y, z: enemy.mesh.position.z,
            ry: enemy.mesh.rotation.y,
            hp: enemy.hp,
          });
        }
      }
    }
  }

  // 处理待处理的敌人状态
  for (const msg of pendingEnemyState) {
    if (msg.type === 'enemy_death') {
      for (const enemy of enemies) {
        if (!enemy.dead && enemy.mesh.userData.netId === msg.enemyId) {
          killEnemy(enemy);
          break;
        }
      }
    } else if (msg.type === 'enemy_damage') {
      for (const enemy of enemies) {
        if (!enemy.dead && enemy.mesh.userData.netId === msg.enemyId) {
          damageEnemy(enemy, msg.dmg);
          break;
        }
      }
    }
  }
  pendingEnemyState = [];

  // 插值远程玩家位置（Y始终为0，内部部件自带高度偏移）
  for (const [id, rp] of remotePlayers) {
    rp.pos.lerp(rp.targetPos, 0.3);
    rp.yaw += (rp.targetYaw - rp.yaw) * 0.3;
    rp.mesh.position.set(rp.pos.x, 0, rp.pos.z);
    rp.mesh.rotation.y = rp.yaw;
  }
}

function updateConnStatus(msg, cls) {
  const el = document.getElementById('conn-status');
  if (el) {
    el.textContent = msg;
    el.className = cls || '';
  }
}

function startMultiplayerGame(mode) {
  if (mode === 'host') {
    connectWebSocket('ws://localhost:8765', true).then(() => {
      updateConnStatus('房间已创建，等待玩家加入...', 'connected');
      startGame();
    }).catch(() => {});
  } else if (mode === 'join') {
    let ip = document.getElementById('join-ip').value.trim();
    if (!ip) { updateConnStatus('请输入主机地址', 'error'); return; }
    if (!ip.startsWith('ws://')) ip = 'ws://' + ip;
    updateConnStatus('正在连接...', '');
    connectWebSocket(ip, false).then(() => {
      startGame();
    }).catch(() => {});
  }
}

function notifyShoot(origin, dir, hitEnemy, hitPoint, dmg) {
  if (!isMultiplayer) return;
  const msg = { type: 'shoot', ox: origin.x, oy: origin.y, oz: origin.z, dx: dir.x, dy: dir.y, dz: dir.z };
  if (hitEnemy) {
    msg.hitEnemy = true;
    msg.hitX = hitPoint.x; msg.hitY = hitPoint.y; msg.hitZ = hitPoint.z;
    msg.dmg = dmg;
    msg.enemyId = hitEnemy.mesh.userData.netId;
    // 同步敌人伤害到客户端
    sendNetMessage({ type: 'enemy_damage', enemyId: hitEnemy.mesh.userData.netId, dmg: dmg, hp: hitEnemy.hp });
  }
  sendNetMessage(msg);
}

function notifyKnife(origin, dir, hitEnemy, hitPoint, dmg) {
  if (!isMultiplayer) return;
  const msg = { type: 'knife', ox: origin.x, oy: origin.y, oz: origin.z, dx: dir.x, dy: dir.y, dz: dir.z };
  if (hitEnemy) {
    msg.hitEnemy = true;
    msg.hitX = hitPoint.x; msg.hitY = hitPoint.y; msg.hitZ = hitPoint.z;
    msg.dmg = dmg;
    msg.enemyId = hitEnemy.mesh.userData.netId;
    sendNetMessage({ type: 'enemy_damage', enemyId: hitEnemy.mesh.userData.netId, dmg: dmg, hp: hitEnemy.hp });
  }
  sendNetMessage(msg);
}

// ==================== 游戏循环 ====================
const clock = new THREE.Clock();
let playerVelocity = new THREE.Vector3();
let cameraBobPhase = 0;
let playerSpeed = 0;
let bobOffsetX = 0, bobOffsetY = 0, bobOffsetZ = 0;

function update(dt) {
  if (!gameRunning) return;

  // 限制 dt
  dt = Math.min(dt, 0.1);

  if (gamePaused) {
    updateParticles(dt);
    updateBulletTrails(dt);
    updateProjectiles(dt);
    return;
  }

  // 武器计时器
  if (fireTimer > 0) fireTimer -= dt;
  if (isReloading) {
    reloadTimer -= dt;
    if (reloadTimer <= 0) finishReload();
  }

  // 枪口闪光
  if (muzzleFlashTimer > 0) {
    muzzleFlashTimer -= dt;
    muzzleFlash.intensity = Math.max(0, muzzleFlashTimer / 0.05 * 8);
    flashSprite.material.opacity = Math.max(0, muzzleFlashTimer / 0.05);
    flashSprite.scale.setScalar(0.25 * (1 + muzzleFlashTimer / 0.05 * 0.5));
  }

  // 后坐力恢复 & 换弹动画
  recoilRecovery += dt;
  recoilOffset = Math.max(0, recoilOffset - dt * 0.3);

  // 大招期间锁定空手，跳过所有武器动画
  if (ultActive) {
    gunGroup.visible = false;
    knifeGroup.visible = false;
    handsGroup.visible = true;
    gunGroup.rotation.x = 0;
    // 不执行下面的武器动画，直接跳到相机旋转
  } else if (isReloading) {
    reloadAnimProgress += dt / RELOAD_TIME;
    if (reloadAnimProgress > 1) reloadAnimProgress = 1;

    const t = reloadAnimProgress;
    let animT;
    if (t < 0.2) {
      // 放下枪 (0 -> 0.2)
      animT = t / 0.2;
      gunGroup.position.x = GUN_POS_IDLE.x;
      gunGroup.position.y = GUN_POS_IDLE.y + (GUN_POS_RELOAD.y - GUN_POS_IDLE.y) * animT;
      gunGroup.position.z = GUN_POS_IDLE.z + (GUN_POS_RELOAD.z - GUN_POS_IDLE.z) * animT;
      gunGroup.rotation.x = GUN_ROT_RELOAD * animT;
    } else if (t < 0.75) {
      // 保持低位 (0.2 -> 0.75)
      gunGroup.position.x = GUN_POS_RELOAD.x;
      gunGroup.position.y = GUN_POS_RELOAD.y;
      gunGroup.position.z = GUN_POS_RELOAD.z;
      gunGroup.rotation.x = GUN_ROT_RELOAD;
    } else {
      // 抬起枪 (0.75 -> 1.0)
      animT = (t - 0.75) / 0.25;
      gunGroup.position.x = GUN_POS_IDLE.x;
      gunGroup.position.y = GUN_POS_RELOAD.y + (GUN_POS_IDLE.y - GUN_POS_RELOAD.y) * animT;
      gunGroup.position.z = GUN_POS_RELOAD.z + (GUN_POS_IDLE.z - GUN_POS_RELOAD.z) * animT;
      gunGroup.rotation.x = GUN_ROT_RELOAD * (1 - animT);
    }
  } else if (switchProgress !== switchTarget) {
    // 武器切换动画
    const speed = dt / WEAPON_SWITCH_TIME;
    if (switchTarget === 1) {
      switchProgress = Math.min(1, switchProgress + speed);
      // 枪往下藏，匕首往上升
      const t = switchProgress;
      gunGroup.position.x = GUN_POS_ACTIVE.x + (GUN_POS_HIDDEN.x - GUN_POS_ACTIVE.x) * t;
      gunGroup.position.y = GUN_POS_ACTIVE.y + (GUN_POS_HIDDEN.y - GUN_POS_ACTIVE.y) * t;
      gunGroup.position.z = GUN_POS_ACTIVE.z + (GUN_POS_HIDDEN.z - GUN_POS_ACTIVE.z) * t;
      gunGroup.rotation.x = 0;
      knifeGroup.position.y = KNIFE_POS_HIDDEN.y + (KNIFE_POS_ACTIVE.y - KNIFE_POS_HIDDEN.y) * t;
      knifeGroup.position.z = KNIFE_POS_HIDDEN.z + (KNIFE_POS_ACTIVE.z - KNIFE_POS_HIDDEN.z) * t;
      knifeGroup.visible = true;
      if (t >= 1) { gunGroup.visible = false; switchProgress = 1; }
    } else {
      switchProgress = Math.max(0, switchProgress - speed);
      const t = switchProgress;
      gunGroup.visible = true;
      gunGroup.position.x = GUN_POS_ACTIVE.x + (GUN_POS_HIDDEN.x - GUN_POS_ACTIVE.x) * t;
      gunGroup.position.y = GUN_POS_ACTIVE.y + (GUN_POS_HIDDEN.y - GUN_POS_ACTIVE.y) * t;
      gunGroup.position.z = GUN_POS_ACTIVE.z + (GUN_POS_HIDDEN.z - GUN_POS_ACTIVE.z) * t;
      gunGroup.rotation.x = 0;
      knifeGroup.position.y = KNIFE_POS_HIDDEN.y + (KNIFE_POS_ACTIVE.y - KNIFE_POS_HIDDEN.y) * t;
      knifeGroup.position.z = KNIFE_POS_HIDDEN.z + (KNIFE_POS_ACTIVE.z - KNIFE_POS_HIDDEN.z) * t;
      if (t <= 0) { knifeGroup.visible = false; switchProgress = 0; }
    }
  } else if (currentWeapon === 'knife') {
    // 匕首待机 + 攻击动画
    gunGroup.visible = false;
    knifeGroup.visible = true;
    // 匕首微小浮动
    knifeGroup.position.y = KNIFE_POS_ACTIVE.y + Math.sin(Date.now() * 0.005) * 0.01;
    knifeGroup.position.z = KNIFE_POS_ACTIVE.z;

    // 刀攻击计时器
    if (knifeAttackTimer > 0) knifeAttackTimer -= dt;

    // 刺杀动画
    if (knifeStabPhase > 0) {
      knifeStabPhase -= dt;
      if (knifeStabPhase > 0.15) {
        const stabT = (0.3 - knifeStabPhase) / 0.15;
        knifeGroup.position.z = KNIFE_POS_ACTIVE.z - stabT * 0.5;
        knifeGroup.position.y = KNIFE_POS_ACTIVE.y - stabT * 0.05;
      } else if (knifeStabPhase > 0) {
        const retT = 1 - knifeStabPhase / 0.15;
        knifeGroup.position.z = KNIFE_POS_ACTIVE.z - 0.5 + retT * 0.5;
        knifeGroup.position.y = KNIFE_POS_ACTIVE.y - 0.05 + retT * 0.05;
      }
    }
  } else {
    // 正常状态（枪）：应用后坐力
    knifeGroup.visible = false;
    gunGroup.visible = true;
    gunGroup.position.x = GUN_POS_IDLE.x;
    gunGroup.position.z = GUN_POS_IDLE.z + recoilOffset;
    gunGroup.position.y = GUN_POS_IDLE.y - recoilOffset * 0.5;
    gunGroup.rotation.x = 0;
  }

  // 更新相机旋转
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // 记录移动前位置用于计算速度
  const prevX = camera.position.x;
  const prevZ = camera.position.z;

  // 玩家移动
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();
  const right = new THREE.Vector3();
  right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

  const moveDir = new THREE.Vector3();
  if (keys.w) moveDir.add(forward);
  if (keys.s) moveDir.sub(forward);
  if (keys.a) moveDir.sub(right);
  if (keys.d) moveDir.add(right);
  if (moveDir.length() > 1) moveDir.normalize();

  const moveSpeed = PLAYER_SPEED * dt;
  const newPos = camera.position.clone();
  newPos.x += moveDir.x * moveSpeed;
  newPos.z += moveDir.z * moveSpeed;

  // 玩家碰撞检测
  if (!checkBuildingCollision(new THREE.Vector3(newPos.x, PLAYER_HEIGHT, camera.position.z), PLAYER_RADIUS)) {
    camera.position.x = newPos.x;
  }
  if (!checkBuildingCollision(new THREE.Vector3(camera.position.x, PLAYER_HEIGHT, newPos.z), PLAYER_RADIUS)) {
    camera.position.z = newPos.z;
  }

  // 撤销上帧的晃动偏移，让物理系统用真实位置计算
  camera.position.x -= bobOffsetX;
  camera.position.y -= bobOffsetY;
  camera.position.z -= bobOffsetZ;
  bobOffsetX = 0; bobOffsetY = 0; bobOffsetZ = 0;

  // 重力与跳跃
  playerVelocity.y -= GRAVITY * dt;
  if (keys.space && player.onGround) {
    playerVelocity.y = JUMP_VELOCITY;
    player.onGround = false;
  }
  camera.position.y += playerVelocity.y * dt;
  if (camera.position.y <= PLAYER_HEIGHT) {
    camera.position.y = PLAYER_HEIGHT;
    playerVelocity.y = 0;
    player.onGround = true;
  }

  // 限制在竞技场内
  const halfA = ARENA_SIZE / 2 - 2;
  camera.position.x = Math.max(-halfA, Math.min(halfA, camera.position.x));
  camera.position.z = Math.max(-halfA, Math.min(halfA, camera.position.z));

  // 计算实际水平移动速度（用于散布判定）
  const dx = camera.position.x - prevX;
  const dz = camera.position.z - prevZ;
  const rawSpeed = Math.sqrt(dx * dx + dz * dz) / Math.max(dt, 0.001);
  playerSpeed += (rawSpeed - playerSpeed) * 0.3;

  // 相机跑动晃动
  const isMoving = keys.w || keys.a || keys.s || keys.d;
  if (isMoving && player.onGround) {
    cameraBobPhase += dt * 9;
    bobOffsetY = Math.sin(cameraBobPhase) * 0.04;
    const rightBob = new THREE.Vector3();
    rightBob.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();
    bobOffsetX = Math.cos(cameraBobPhase * 0.5) * 0.015 * rightBob.x;
    bobOffsetZ = Math.cos(cameraBobPhase * 0.5) * 0.015 * rightBob.z;
    camera.position.x += bobOffsetX;
    camera.position.y += bobOffsetY;
    camera.position.z += bobOffsetZ;
  } else if (player.onGround) {
    cameraBobPhase *= 0.9;
  }

  // 屏幕震动（也通过偏移系统）
  if (shakeDuration > 0) {
    shakeDuration -= dt;
    const s = shakeAmount * (shakeDuration / 0.08);
    const sx = (Math.random() - 0.5) * s * 2;
    const sy = (Math.random() - 0.5) * s * 2;
    const sz = (Math.random() - 0.5) * s * 2;
    camera.position.x += sx; bobOffsetX += sx;
    camera.position.y += sy; bobOffsetY += sy;
    camera.position.z += sz; bobOffsetZ += sz;
  }

  player.position.copy(camera.position);

  // 联机模式不更新AI敌人
  if (!isMultiplayer) {
    updateEnemies(dt);
    updateSpawning(dt);
  }

  // 更新投射物
  updateProjectiles(dt);

  // 更新粒子
  updateParticles(dt);

  // 更新弹线
  updateBulletTrails(dt);

  // 更新弹壳
  updateCasings(dt);

  // 更新弹孔
  updateBulletHoles(dt);

  // 更新技能
  updateAbilities(dt);
  updateFlyingKnives(dt);
  if (ultActive) positionUltKnives();

  // 更新灰尘
  updateDust(dt, camera.position);

  // 更新血包
  updateHealthPacks(dt);

  // 网络同步
  syncNetwork(dt);

  // 更新小地图
  updateMinimap();
}

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();
  update(dt);

  renderer.render(scene, camera);
}

// ==================== 初始化 ====================
updateUI();
animate();

console.log('🏟️  竞技场射手 - Arena Shooter 3D 已就绪');

console.log('🖱️  WASD移动 | 鼠标瞄准 | 左键射击 | R换弹 | 空格跳跃');
</script>
