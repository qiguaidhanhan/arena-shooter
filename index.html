<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞技场射手 - 50兵种 · 双人联机 · Arena Shooter 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
  canvas { display: block; }

  #ui {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }

  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 24px; height: 24px;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.9);
  }
  #crosshair::before {
    top: 10px; left: 0; width: 24px; height: 2px;
  }
  #crosshair::after {
    top: 0; left: 10px; width: 2px; height: 24px;
  }
  #crosshair .dot {
    position: absolute; top: 9px; left: 9px;
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(255,50,50,0.8);
  }

  #hud-bottom {
    position: absolute; bottom: 30px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 40px; align-items: center;
  }

  .hud-item {
    color: #fff; font-size: 18px; font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    background: rgba(0,0,0,0.4); padding: 8px 16px;
    border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);
  }

  #health-bar-bg {
    width: 200px; height: 20px; background: rgba(0,0,0,0.6);
    border-radius: 10px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.3);
  }
  #health-bar {
    width: 100%; height: 100%; background: linear-gradient(90deg, #ff3333, #ff6666);
    border-radius: 10px; transition: width 0.3s;
  }

  #abilities-hud {
    position: absolute; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 10px; pointer-events: none; z-index: 15;
  }
  .abil-slot {
    width: 50px; height: 50px;
    background: rgba(40,40,40,0.7);
    border: 2px solid #555;
    border-radius: 8px;
    position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .abil-slot.ult { border-color: #336699; }
  .abil-fill {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
    background: rgba(100,180,255,0.3);
    transition: height 0.3s;
  }
  .abil-key {
    position: absolute; top: 4px; left: 6px;
    color: #fff; font-size: 11px; font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  }
  .abil-label {
    color: #fff; font-size: 15px; font-weight: bold; z-index: 1;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  }

  #weapon-indicator {
    position: absolute; bottom: 130px; right: 50px;
    color: #fff; font-size: 16px; font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    background: rgba(0,0,0,0.4); padding: 6px 14px;
    border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);
    transition: all 0.2s;
  }

  #ammo-display {
    position: absolute; bottom: 80px; right: 50px;
    color: #fff; font-size: 28px; font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  }
  #ammo-display .current { font-size: 48px; }
  #ammo-display .separator { color: rgba(255,255,255,0.5); margin: 0 4px; }

  #hit-indicator {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    box-shadow: inset 0 0 150px rgba(255,0,0,0);
    transition: box-shadow 0.1s;
  }
  #hit-indicator.damage {
    box-shadow: inset 0 0 150px rgba(255,0,0,0.6);
  }

  #kill-feed {
    position: absolute; top: 80px; right: 30px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .kill-msg {
    color: #ffcc00; font-size: 14px; font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    animation: fadeUp 1.5s forwards;
  }
  @keyframes fadeUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-30px); }
  }

  #screen-msg {
    position: absolute; top: 14%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px; font-weight: bold; color: #fff;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
    text-align: center; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }

  #vignette {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 6;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
  }

  #start-screen, #gameover-screen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; pointer-events: all;
    background: rgba(0,0,0,0.7);
  }
  #gameover-screen { display: none; }

  .title {
    font-size: 64px; font-weight: bold; color: #ff4444;
    text-shadow: 0 0 20px rgba(255,0,0,0.5), 0 0 40px rgba(255,0,0,0.3);
    margin-bottom: 10px;
    letter-spacing: 4px;
  }
  .subtitle { color: #aaa; font-size: 18px; margin-bottom: 40px; }

  button {
    padding: 16px 48px; font-size: 22px; font-weight: bold;
    background: linear-gradient(135deg, #ff4444, #cc2222);
    color: #fff; border: none; border-radius: 8px;
    cursor: pointer; letter-spacing: 2px;
    box-shadow: 0 4px 15px rgba(255,0,0,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  button:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255,0,0,0.6); }
  button:active { transform: scale(0.98); }

  .controls-info {
    color: #888; font-size: 14px; margin-top: 30px;
    text-align: center; line-height: 1.8;
  }
  .controls-info span { color: #ffcc00; }

  .join-row {
    display: flex; gap: 8px; align-items: center; margin-bottom: 6px;
  }
  #join-ip {
    padding: 10px 14px; font-size: 14px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(0,0,0,0.4); color: #fff; width: 280px;
    outline: none; font-family: monospace;
  }
  #join-ip:focus { border-color: #4488ff; }
  #join-btn {
    padding: 10px 24px; font-size: 14px; font-weight: bold;
    background: linear-gradient(135deg, #44aa44, #228822);
    color: #fff; border: none; border-radius: 6px;
    cursor: pointer; box-shadow: 0 2px 10px rgba(0,200,0,0.3);
    transition: transform 0.1s;
  }
  #join-btn:hover { transform: scale(1.05); }
  #join-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  #conn-status {
    color: #ffcc00; font-size: 13px; min-height: 20px; margin-bottom: 4px;
  }
  #conn-status.connected { color: #44ff44; }
  #conn-status.error { color: #ff4444; }

  #score-final { color: #ffcc00; font-size: 28px; margin: 10px 0 30px; }

  #minimap {
    position: absolute; bottom: 30px; left: 30px;
    width: 180px; height: 180px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.5);
  }
</style>
</head>

  <div id="hit-indicator"></div>
  <div id="kill-feed"></div>
  <div id="screen-msg"></div>

  <div id="start-screen">
    <div class="title">竞技场射手</div>
    <div class="subtitle">ARENA SHOOTER 3D</div>
    <div style="display:flex; gap:16px; margin-bottom:10px;">
      <button id="start-btn" style="font-size:18px; padding:14px 36px;">单人游戏</button>
      <button id="host-btn" style="font-size:18px; padding:14px 36px; background:linear-gradient(135deg,#4488ff,#2266cc); box-shadow:0 4px 15px rgba(0,100,255,0.4);">创建房间</button>
    </div>
    <div class="join-row">
      <input id="join-ip" type="text" placeholder="输入主机 IP 地址 (如 192.168.1.5:8765)" />
      <button id="join-btn">加入房间</button>
    </div>
    <div id="conn-status"></div>
    <div style="color:#aaa; font-size:11px; margin-bottom:8px; line-height:1.6;">
      <b>联机说明：</b><br>
      主机：双击运行 <span style="color:#ffcc00;">start-server.bat</span>（Win）或 <span style="color:#ffcc00;">python server.py</span><br>
      　　　服务器启动后，浏览器打开此页，点击 <span style="color:#44aaff;">"创建房间"</span><br>
      客机：在下方输入主机IP地址（如 <span style="color:#ffcc00;">192.168.1.5:8765</span>）<br>
      　　　点击 <span style="color:#44ff44;">"加入房间"</span>
    </div>
    <div class="controls-info">
      <span>W A S D</span> 移动 &nbsp;|&nbsp; <span>鼠标</span> 瞄准<br>
      <span>左键</span> 射击/刺击 &nbsp;|&nbsp; <span>R</span> 换弹 &nbsp;|&nbsp; <span>空格</span> 跳跃<br>
      <span>滚轮</span> 切换枪/刀 &nbsp;|&nbsp; <span>ESC</span> 暂停<br>
      <span>C</span> 烟雾弹 &nbsp; <span>Q</span> 上升气流 &nbsp; <span>E</span> 冲刺 &nbsp; <span>X</span> 飞刀风暴
    </div>
  </div>

  <div id="gameover-screen">
    <div class="title">游戏结束</div>
    <div id="score-final"></div>
    <button id="restart-btn">重新开始</button>
  </div>
</div>

<script src="three.min.js"></script>

// ==================== DOM元素 ====================
const scoreEl = document.getElementById('score');
const waveNumEl = document.getElementById('wave-num');
const enemyCountEl = document.getElementById('enemy-count');
const healthBar = document.getElementById('health-bar');
const hitIndicator = document.getElementById('hit-indicator');
const killFeed = document.getElementById('kill-feed');
const screenMsg = document.getElementById('screen-msg');
const ammoCurrent = document.getElementById('ammo-current');
const ammoReserve = document.getElementById('ammo-reserve');
const startScreen = document.getElementById('start-screen');
const gameoverScreen = document.getElementById('gameover-screen');
const scoreFinal = document.getElementById('score-final');
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');

// ==================== Three.js 初始化 ====================

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 50, 200);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, PLAYER_HEIGHT, 0);

// ==================== 音效系统 (Web Audio API) ====================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioEnabled = false;

function playSound(freq, type, duration, vol = 0.3, freq2 = null) {
  if (!audioEnabled) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (freq2) osc.frequency.linearRampToValueAtTime(freq2, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

// ==================== 粒子系统 ====================
const particles = [];

function spawnParticles(pos, color, count = 15, speed = 5, lifetime = 0.6) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.08, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color });
    const particle = new THREE.Mesh(geo, mat);
    particle.position.copy(pos);
    const dir = new THREE.Vector3(
      (Math.random() - 0.5) * 2,
      Math.random() * 2,
      (Math.random() - 0.5) * 2
    ).normalize();
    particle.userData = {
      velocity: dir.multiplyScalar(speed * (0.5 + Math.random())),
      life: lifetime * (0.5 + Math.random() * 0.5),
      maxLife: lifetime,
    };
    scene.add(particle);
    particles.push(particle);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.userData.life -= dt;
    if (p.userData.life <= 0) {
      scene.remove(p);
      p.geometry.dispose();
      p.material.dispose();
      particles.splice(i, 1);
    } else {
      p.userData.velocity.y -= 10 * dt;
      p.position.add(p.userData.velocity.clone().multiplyScalar(dt));
      const alpha = p.userData.life / p.userData.maxLife;
      p.material.opacity = alpha;
      p.material.transparent = true;
      p.scale.setScalar(alpha);
    }
  }
}

// 弹线效果
const bulletTrails = [];
function createBulletTrail(from, to) {
  const points = [from.clone(), to.clone()];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0xffff88, transparent: true, opacity: 0.6 });
  const line = new THREE.Line(geo, mat);
  line.userData = { life: 0.15, maxLife: 0.15 };
  scene.add(line);
  bulletTrails.push(line);
}

function updateBulletTrails(dt) {
  for (let i = bulletTrails.length - 1; i >= 0; i--) {
    const trail = bulletTrails[i];
    trail.userData.life -= dt;
    if (trail.userData.life <= 0) {
      scene.remove(trail);
      trail.geometry.dispose();
      trail.material.dispose();
      bulletTrails.splice(i, 1);
    } else {
      trail.material.opacity = trail.userData.life / trail.userData.maxLife * 0.6;
    }
  }
}

// ==================== 弹壳系统 ====================
const casings = [];
function ejectCasing() {
  const muzzlePos = new THREE.Vector3();
  gunBarrel.getWorldPosition(muzzlePos);
  const casingGeo = new THREE.CylinderGeometry(0.01, 0.012, 0.04, 6);
  const casingMat = new THREE.MeshStandardMaterial({ color: 0xcc9922, roughness: 0.25, metalness: 0.9 });
  const casing = new THREE.Mesh(casingGeo, casingMat);
  casing.castShadow = true;
  // 从枪右侧抛出
  const rightDir = new THREE.Vector3();
  camera.getWorldDirection(new THREE.Vector3());
  rightDir.crossVectors(camera.getWorldDirection(new THREE.Vector3()), new THREE.Vector3(0, 1, 0)).normalize();
  casing.position.copy(muzzlePos).add(rightDir.clone().multiplyScalar(0.12));
  casing.userData = {
    velocity: rightDir.multiplyScalar(1.5 + Math.random() * 1.5)
      .add(new THREE.Vector3(0, 2 + Math.random() * 3, 0))
      .add(camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(-0.5 - Math.random())),
    angularVel: new THREE.Vector3(Math.random() * 10, Math.random() * 15, Math.random() * 10),
    life: 1.5 + Math.random(),
  };
  scene.add(casing);
  casings.push(casing);
}

function updateCasings(dt) {
  for (let i = casings.length - 1; i >= 0; i--) {
    const c = casings[i];
    c.userData.life -= dt;
    if (c.userData.life <= 0) {
      scene.remove(c); c.geometry.dispose(); c.material.dispose();
      casings.splice(i, 1); continue;
    }
    c.userData.velocity.y -= 15 * dt;
    c.position.add(c.userData.velocity.clone().multiplyScalar(dt));
    c.rotation.x += c.userData.angularVel.x * dt;
    c.rotation.y += c.userData.angularVel.y * dt;
    c.rotation.z += c.userData.angularVel.z * dt;
    // 地面碰撞
    if (c.position.y < 0.02) {
      c.position.y = 0.02;
      c.userData.velocity.y = 0;
      c.userData.velocity.multiplyScalar(0.3);
      c.userData.angularVel.multiplyScalar(0.1);
    }
  }
}

// ==================== 弹孔系统 ====================
const bulletHoles = [];
function addBulletHole(pos, normal) {
  const holeGeo = new THREE.CircleGeometry(0.06, 8);
  const holeMat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide, transparent: true, opacity: 0.85, depthWrite: false });
  const hole = new THREE.Mesh(holeGeo, holeMat);
  hole.position.copy(pos).add(normal.clone().multiplyScalar(0.03));
  hole.lookAt(pos.clone().add(normal));
  hole.userData = { life: 15 };
  scene.add(hole);
  bulletHoles.push(hole);
  if (bulletHoles.length > 60) {
    const old = bulletHoles.shift();
    scene.remove(old); old.geometry.dispose(); old.material.dispose();
  }
}

function updateBulletHoles(dt) {
  for (let i = bulletHoles.length - 1; i >= 0; i--) {
    const h = bulletHoles[i];
    h.userData.life -= dt;
    if (h.userData.life <= 0) {
      scene.remove(h); h.geometry.dispose(); h.material.dispose();
      bulletHoles.splice(i, 1);
    }
  }
}

  shakeAmount = Math.max(shakeAmount, amount);
  shakeDuration = Math.max(shakeDuration, duration);
}

// ==================== 环境灰尘 ====================
const dustParticles = [];
const dustGeo = new THREE.SphereGeometry(0.015, 3, 3);
for (let i = 0; i < 120; i++) {
  const dustMat = new THREE.MeshBasicMaterial({ color: 0xddccaa, transparent: true, opacity: 0.15 + Math.random() * 0.25, depthWrite: false });
  const dust = new THREE.Mesh(dustGeo, dustMat);
  dust.position.set(
    (Math.random() - 0.5) * ARENA_SIZE * 0.9,
    Math.random() * 6,
    (Math.random() - 0.5) * ARENA_SIZE * 0.9
  );
  dust.userData = {
    baseY: dust.position.y,
    floatSpeed: 0.3 + Math.random() * 0.7,
    floatAmp: 0.2 + Math.random() * 0.6,
    driftX: (Math.random() - 0.5) * 0.3,
    driftZ: (Math.random() - 0.5) * 0.3,
  };
  scene.add(dust);
  dustParticles.push(dust);
}

function updateDust(dt, cameraPos) {
  const halfA = ARENA_SIZE / 2 - 5;
  for (const dust of dustParticles) {
    dust.position.y = dust.userData.baseY + Math.sin(Date.now() * 0.001 * dust.userData.floatSpeed) * dust.userData.floatAmp;
    dust.position.x += dust.userData.driftX * dt;
    dust.position.z += dust.userData.driftZ * dt;
    // 环绕在玩家周围
    if (Math.abs(dust.position.x - cameraPos.x) > halfA) dust.position.x = cameraPos.x + (Math.random() - 0.5) * ARENA_SIZE * 0.8;
    if (Math.abs(dust.position.z - cameraPos.z) > halfA) dust.position.z = cameraPos.z + (Math.random() - 0.5) * ARENA_SIZE * 0.8;
    // 距离玩家太远就重置
    const dist = Math.abs(dust.position.x - cameraPos.x) + Math.abs(dust.position.z - cameraPos.z);
    if (dist > ARENA_SIZE * 0.7) {
      dust.position.x = cameraPos.x + (Math.random() - 0.5) * ARENA_SIZE * 0.7;
      dust.position.z = cameraPos.z + (Math.random() - 0.5) * ARENA_SIZE * 0.7;
    }
  }
}

// ==================== 投射物 ====================
const projectiles = [];
function createProjectile(from, dir, isEnemy = false) {
  const geo = new THREE.SphereGeometry(isEnemy ? 0.1 : 0.05, 4, 4);
  const mat = new THREE.MeshBasicMaterial({ color: isEnemy ? 0xff4444 : 0xffff44 });
  const proj = new THREE.Mesh(geo, mat);
  proj.position.copy(from);
  proj.userData = {
    velocity: dir.clone().multiplyScalar(isEnemy ? 25 : 80),
    life: 3,
    isEnemy,
  };
  scene.add(proj);
  projectiles.push(proj);

  // 拖尾光点
  const trailGeo = new THREE.SphereGeometry(isEnemy ? 0.06 : 0.03, 3, 3);
  const trailMat = new THREE.MeshBasicMaterial({ color: isEnemy ? 0xff8844 : 0xffdd44, transparent: true, opacity: 0.5 });
  const trail = new THREE.Mesh(trailGeo, trailMat);
  trail.position.copy(from);
  trail.userData = { life: 0.2, maxLife: 0.2 };
  scene.add(trail);
  proj.userData.trail = trail;
  proj.userData.lastTrailPos = from.clone();
  proj.userData.trailTimer = 0;

  return proj;
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const proj = projectiles[i];
    proj.userData.life -= dt;

    // 更新拖尾
    proj.userData.trailTimer -= dt;
    if (proj.userData.trailTimer <= 0) {
      proj.userData.trailTimer = 0.03;
      proj.userData.trail.position.copy(proj.position);
      proj.userData.trail.userData.life = 0.15;
    }
    if (proj.userData.trail) {
      proj.userData.trail.userData.life -= dt;
      if (proj.userData.trail.userData.life <= 0) {
        scene.remove(proj.userData.trail);
        proj.userData.trail.geometry.dispose();
        proj.userData.trail.material.dispose();
        proj.userData.trail = null;
      } else {
        const alpha = proj.userData.trail.userData.life / 0.2;
        proj.userData.trail.material.opacity = alpha * 0.5;
        proj.userData.trail.scale.setScalar(alpha);
      }
    }

    if (proj.userData.life <= 0) {
      if (proj.userData.trail) {
        scene.remove(proj.userData.trail);
        proj.userData.trail.geometry.dispose();
        proj.userData.trail.material.dispose();
      }
      scene.remove(proj);
      proj.geometry.dispose();
      proj.material.dispose();
      projectiles.splice(i, 1);
      continue;
    }

    proj.position.add(proj.userData.velocity.clone().multiplyScalar(dt));

    // 检查碰撞
    if (!proj.userData.isEnemy) {
      // 玩家子弹：检测敌人
      for (const enemy of enemies) {
        if (enemy.dead) continue;
        const dist = proj.position.distanceTo(enemy.mesh.position);
        if (dist < 1.2) {
          damageEnemy(enemy, BULLET_DAMAGE);
          spawnParticles(proj.position.clone(), 0xffaa44, 5, 3, 0.2);
          if (proj.userData.trail) {
            scene.remove(proj.userData.trail);
            proj.userData.trail.geometry.dispose();
            proj.userData.trail.material.dispose();
          }
          scene.remove(proj);
          proj.geometry.dispose();
          proj.material.dispose();
          projectiles.splice(i, 1);
          break;
        }
      }
    } else {
      // 敌人子弹：检测玩家
      const dist = proj.position.distanceTo(camera.position);
      if (dist < 1.0) {
        damagePlayer(proj.userData.damage || 8);
        spawnParticles(proj.position.clone(), 0xff4444, 5, 2, 0.15);
        if (proj.userData.trail) {
          scene.remove(proj.userData.trail);
          proj.userData.trail.geometry.dispose();
          proj.userData.trail.material.dispose();
        }
        scene.remove(proj);
        proj.geometry.dispose();
        proj.material.dispose();
        projectiles.splice(i, 1);
      }
    }

    // 检查建筑碰撞
    if (proj.userData.life > 0) {
      for (const b of buildings) {
        const bs = b.userData.size;
        const bp = b.position;
        const pp = proj.position;
        if (Math.abs(pp.x - bp.x) < bs.w / 2 + 0.3 &&
            Math.abs(pp.y - bp.y) < bs.h / 2 + 0.3 &&
            Math.abs(pp.z - bp.z) < bs.d / 2 + 0.3) {
          spawnParticles(proj.position.clone(), 0xffcc88, 8, 4, 0.3);
          if (proj.userData.trail) {
            scene.remove(proj.userData.trail);
            proj.userData.trail.geometry.dispose();
            proj.userData.trail.material.dispose();
          }
          scene.remove(proj);
          proj.geometry.dispose();
          proj.material.dispose();
          projectiles.splice(i, 1);
          break;
        }
      }
    }
  }
}

const enemies = [];
let waveNumber = 0;
let enemiesRemaining = 0;
let waveActive = false;
let spawnQueue = [];

function createEnemyMesh(type) {
  const config = ENEMY_TYPES[type];
  const s = config.scale;
  const g = new THREE.Group();

  // 材质预设
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xeebb99, roughness: 0.6 });
  const armorMat = new THREE.MeshStandardMaterial({ color: config.color, roughness: 0.5, metalness: 0.3 });
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.7 });
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff2222 });
  const gunMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.8 });

  // 腿部（上下两段 + 靴子）
  const upperLegGeo = new THREE.CylinderGeometry(0.11 * s, 0.12 * s, 0.4 * s, 6);
  const lowerLegGeo = new THREE.CylinderGeometry(0.09 * s, 0.1 * s, 0.35 * s, 6);
  const bootGeo = new THREE.BoxGeometry(0.14 * s, 0.08 * s, 0.2 * s);
  [
    [-0.14 * s, 0.2 * s, 0], [0.14 * s, 0.2 * s, 0]
  ].forEach(([lx, lz]) => {
    const upper = new THREE.Mesh(upperLegGeo, darkMat); upper.position.set(lx, 0.55 * s, lz); upper.castShadow = true; g.add(upper);
    const lower = new THREE.Mesh(lowerLegGeo, darkMat); lower.position.set(lx, 0.2 * s, lz); lower.castShadow = true; g.add(lower);
    const boot = new THREE.Mesh(bootGeo, new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 }));
    boot.position.set(lx, 0.04 * s, lz + 0.04 * s); g.add(boot);
  });

  // 胯部
  const hipGeo = new THREE.BoxGeometry(0.35 * s, 0.15 * s, 0.25 * s);
  const hip = new THREE.Mesh(hipGeo, armorMat); hip.position.y = 0.78 * s; hip.castShadow = true; g.add(hip);

  // 躯干（胸甲 + 腹部）
  const chestGeo = new THREE.BoxGeometry(0.55 * s, 0.4 * s, 0.32 * s);
  const chest = new THREE.Mesh(chestGeo, armorMat); chest.position.y = 1.1 * s; chest.castShadow = true; g.add(chest);
  const absGeo = new THREE.BoxGeometry(0.4 * s, 0.2 * s, 0.28 * s);
  const abs = new THREE.Mesh(absGeo, armorMat); abs.position.y = 0.8 * s; abs.castShadow = true; g.add(abs);

  // 肩甲
  const shoulderGeo = new THREE.SphereGeometry(0.13 * s, 6, 6);
  [
    [-0.35 * s, 1.38 * s], [0.35 * s, 1.38 * s]
  ].forEach(([sx, sy]) => {
    const shoulder = new THREE.Mesh(shoulderGeo, armorMat); shoulder.position.set(sx, sy, 0); shoulder.castShadow = true; g.add(shoulder);
  });

  // 手臂（上臂圆柱 + 前臂圆柱 + 手）
  const upperArmGeo = new THREE.CylinderGeometry(0.07 * s, 0.08 * s, 0.3 * s, 6);
  const lowerArmGeo = new THREE.CylinderGeometry(0.06 * s, 0.07 * s, 0.28 * s, 6);
  const handGeo = new THREE.BoxGeometry(0.08 * s, 0.06 * s, 0.1 * s);
  [
    [-0.4 * s, 0], [0.4 * s, 0]
  ].forEach(([ax, az]) => {
    const upper = new THREE.Mesh(upperArmGeo, armorMat); upper.position.set(ax, 1.2 * s, az); upper.castShadow = true; g.add(upper);
    const lower = new THREE.Mesh(lowerArmGeo, armorMat); lower.position.set(ax, 0.92 * s, az); lower.castShadow = true; g.add(lower);
    const hand = new THREE.Mesh(handGeo, skinMat); hand.position.set(ax, 0.72 * s, az); g.add(hand);
  });

  // 右臂武器（狙击手有专用长枪，医疗兵无武器）
  if (type !== 'sniper' && type !== 'medic') {
    const weaponBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.015 * s, 0.02 * s, 0.22 * s, 6), gunMat);
    weaponBarrel.rotation.x = Math.PI / 2; weaponBarrel.position.set(0.42 * s, 1.18 * s, 0.15 * s); g.add(weaponBarrel);
    const weaponBody = new THREE.Mesh(new THREE.BoxGeometry(0.04 * s, 0.07 * s, 0.12 * s), gunMat);
    weaponBody.position.set(0.4 * s, 1.15 * s, 0.06 * s); g.add(weaponBody);
  }

  // 颈部
  const neckGeo = new THREE.CylinderGeometry(0.07 * s, 0.09 * s, 0.08 * s, 6);
  const neck = new THREE.Mesh(neckGeo, skinMat); neck.position.y = 1.5 * s; neck.userData.isHead = true; g.add(neck);

  // 头部（带头盔）
  const headGeo = new THREE.SphereGeometry(0.22 * s, 10, 8);
  const head = new THREE.Mesh(headGeo, skinMat);
  head.position.y = 1.68 * s; head.castShadow = true; head.userData.isHead = true; g.add(head);

  // 头盔
  const helmGeo = new THREE.SphereGeometry(0.23 * s, 10, 8, 0, Math.PI * 2, 0, Math.PI * 0.6);
  const helmMat = new THREE.MeshStandardMaterial({ color: config.color, roughness: 0.4, metalness: 0.6 });
  const helm = new THREE.Mesh(helmGeo, helmMat); helm.position.y = 1.72 * s; helm.userData.isHead = true; g.add(helm);

  // 护目镜
  const visorGeo = new THREE.BoxGeometry(0.22 * s, 0.06 * s, 0.06 * s);
  const visorMat = new THREE.MeshBasicMaterial({ color: type === 'tank' ? 0xff00ff : type === 'runner' ? 0xff8800 : 0xff0000 });
  const visor = new THREE.Mesh(visorGeo, visorMat); visor.position.set(0, 1.7 * s, 0.2 * s); visor.userData.isHead = true; g.add(visor);

  // 背包（tank专属大号）
  const packGeo = new THREE.BoxGeometry(0.3 * s, 0.4 * s, 0.2 * s);
  const pack = new THREE.Mesh(packGeo, armorMat); pack.position.set(0, 1.15 * s, -0.25 * s); pack.castShadow = true; g.add(pack);

  // 狙击手：长枪管 + 瞄准镜
  if (type === 'sniper') {
    const longBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.01 * s, 0.015 * s, 0.4 * s, 6), gunMat);
    longBarrel.rotation.x = Math.PI / 2; longBarrel.position.set(0.42 * s, 1.18 * s, 0.3 * s); g.add(longBarrel);
    const scope = new THREE.Mesh(new THREE.CylinderGeometry(0.02 * s, 0.02 * s, 0.08 * s, 6),
      new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2, metalness: 0.9 }));
    scope.rotation.x = Math.PI / 2; scope.position.set(0.38 * s, 1.28 * s, 0.1 * s); g.add(scope);
  }

  // 医疗兵：白甲 + 红十字
  if (type === 'medic') {
    chest.material = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, metalness: 0.2 });
    const crossV = new THREE.Mesh(new THREE.BoxGeometry(0.06 * s, 0.2 * s, 0.02 * s),
      new THREE.MeshBasicMaterial({ color: 0xff0000 }));
    crossV.position.set(0, 1.15 * s, 0.18 * s); g.add(crossV);
    const crossH = new THREE.Mesh(new THREE.BoxGeometry(0.2 * s, 0.06 * s, 0.02 * s),
      new THREE.MeshBasicMaterial({ color: 0xff0000 }));
    crossH.position.set(0, 1.15 * s, 0.18 * s); g.add(crossH);
  }

  // 重盾兵：前置大盾
  if (type === 'shield') {
    const shieldGeo = new THREE.BoxGeometry(0.5 * s, 0.8 * s, 0.06 * s);
    const shieldMat = new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.2, metalness: 0.8, transparent: true, opacity: 0.7 });
    const shieldMesh = new THREE.Mesh(shieldGeo, shieldMat);
    shieldMesh.position.set(0, 1.1 * s, 0.22 * s); shieldMesh.userData.isShield = true; g.add(shieldMesh);
    // 盾牌视窗
    const windowGeo = new THREE.BoxGeometry(0.2 * s, 0.06 * s, 0.02 * s);
    const windowMat = new THREE.MeshBasicMaterial({ color: 0x88ccff });
    const shieldWindow = new THREE.Mesh(windowGeo, windowMat);
    shieldWindow.position.set(0, 1.4 * s, 0.26 * s); g.add(shieldWindow);
  }

  // 自爆兵：红色发光核心 + 背包装满炸药
  if (type === 'bomber') {
    const coreGeo = new THREE.SphereGeometry(0.15 * s, 8, 8);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0xff3300 });
    const core = new THREE.Mesh(coreGeo, coreMat); core.position.set(0, 1.15 * s, 0.18 * s); g.add(core);
    // 炸药包
    const bombPack = new THREE.Mesh(new THREE.BoxGeometry(0.35 * s, 0.25 * s, 0.2 * s),
      new THREE.MeshStandardMaterial({ color: 0x886622, roughness: 0.7 }));
    bombPack.position.set(0, 1.1 * s, -0.25 * s); g.add(bombPack);
    // 闪红光的头盔
    helm.material = new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.3, emissive: 0x330000 });
    chest.material = new THREE.MeshStandardMaterial({ color: 0xccaa00, roughness: 0.5, metalness: 0.2 });
  }

  // 幽灵：半透明 + 发光轮廓
  if (type === 'ghost') {
    g.traverse(c => {
      if (c.isMesh && c.material.opacity === undefined) {
        c.material.transparent = true;
        c.material.opacity = 0.45;
        if (c.material.emissive) c.material.emissive = new THREE.Color(0x112233);
        c.material.emissiveIntensity = 0.4;
      }
    });
    helm.material = new THREE.MeshStandardMaterial({ color: 0xaaddff, roughness: 0.3, transparent: true, opacity: 0.5 });
  }

  // 炮塔：无腿无臂，只有基座+枪管
  if (type === 'turret') {
    // 移除不需要的部件（隐藏）
    g.children.forEach(c => {
      if (c.position && Math.abs(c.position.y) < 1.0 && c !== g) c.visible = false;
    });
    // 基座
    const baseGeo = new THREE.CylinderGeometry(0.3 * s, 0.35 * s, 0.4 * s, 8);
    const base = new THREE.Mesh(baseGeo, new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.7 }));
    base.position.y = 0.2 * s; g.add(base);
    // 双枪管
    for (let b = 0; b < 2; b++) {
      const tBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.025 * s, 0.03 * s, 0.35 * s, 6),
        new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.1, metalness: 0.95 }));
      tBarrel.rotation.x = Math.PI / 2; tBarrel.position.set((b - 0.5) * 0.08 * s, 0.45 * s, 0.15 * s); g.add(tBarrel);
    }
    // 传感器（红色闪烁）
    const sensorGeo = new THREE.SphereGeometry(0.06 * s, 6, 6);
    const sensor = new THREE.Mesh(sensorGeo, new THREE.MeshBasicMaterial({ color: 0xff0000 }));
    sensor.position.y = 0.55 * s; g.add(sensor);
  }

  return g;
}

function spawnEnemy(type) {
  const config = ENEMY_TYPES[type];
  const mesh = createEnemyMesh(type);

  // 在竞技场边缘随机生成，避开建筑
  const margin = 4;
  const halfA = ARENA_SIZE / 2 - margin;
  let x, z, tries = 0;
  do {
    const edge = Math.floor(Math.random() * 4);
    switch (edge) {
      case 0: x = -halfA + Math.random() * margin; z = (Math.random() - 0.5) * 2 * halfA; break;
      case 1: x = halfA - Math.random() * margin; z = (Math.random() - 0.5) * 2 * halfA; break;
      case 2: z = -halfA + Math.random() * margin; x = (Math.random() - 0.5) * 2 * halfA; break;
      case 3: z = halfA - Math.random() * margin; x = (Math.random() - 0.5) * 2 * halfA; break;
    }
    tries++;
  } while (checkBuildingCollision(new THREE.Vector3(x, 1, z), 0.8) && tries < 20);

  // 仍然碰撞则放在出生点附近空位
  if (checkBuildingCollision(new THREE.Vector3(x, 1, z), 0.8)) {
    x = (Math.random() - 0.5) * 10;
    z = (Math.random() - 0.5) * 10;
  }
  mesh.position.set(x, 0, z);
  scene.add(mesh);

  const enemy = {
    mesh,
    type,
    config,
    hp: config.hp,
    maxHp: config.hp,
    dead: false,
    fireTimer: config.fireRate * (0.5 + Math.random()),
    state: 'chase', // chase | attack | strafe
    strafeDir: Math.random() > 0.5 ? 1 : -1,
    strafeTimer: 0,
  };
  mesh.userData.netId = mesh.uuid;
  enemies.push(enemy);

  // 同步敌人生成到联机客户端
  if (isMultiplayer && isHost) {
    sendNetMessage({
      type: 'enemy_spawn', enemyId: mesh.userData.netId, enemyType: type,
      x: mesh.position.x, y: mesh.position.y, z: mesh.position.z,
      hp: config.hp, maxHp: config.hp,
    });
  }

  return enemy;
}

function spawnEnemyDirect(type, uuid, x, y, z, hp, maxHp) {
  const config = ENEMY_TYPES[type];
  if (!config) return null;
  const mesh = createEnemyMesh(type);
  mesh.position.set(x, y, z);
  mesh.userData.netId = uuid;
  scene.add(mesh);
  const enemy = {
    mesh, type, config,
    hp: hp || config.hp,
    maxHp: maxHp || config.hp,
    dead: false,
    fireTimer: config.fireRate * (0.5 + Math.random()),
    state: 'chase',
    strafeDir: Math.random() > 0.5 ? 1 : -1,
    strafeTimer: 0,
  };
  enemies.push(enemy);
  return enemy;
}

function damageEnemy(enemy, damage) {
  if (enemy.dead) return;
  enemy.hp -= damage;
  sfxHit();
  spawnParticles(enemy.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)), enemy.config.color, 5, 3, 0.2);

  // 血条闪烁
  enemy.mesh.children.forEach(c => {
    if (c.material && c.material.emissive) {
      c.material.emissive = new THREE.Color(0xff0000);
      c.material.emissiveIntensity = 1;
    }
  });
  setTimeout(() => {
    if (!enemy.dead && enemy.mesh) {
      enemy.mesh.children.forEach(c => {
        if (c.material && c.material.emissive) {
          c.material.emissive = new THREE.Color(0x000000);
          c.material.emissiveIntensity = 0;
        }
      });
    }
  }, 100);

  if (enemy.hp <= 0) {
    killEnemy(enemy);
  }
}

function killEnemy(enemy) {
  enemy.dead = true;
  player.score += enemy.config.points;
  enemiesRemaining--;
  // 大招充能
  player.ultPoints = Math.min(MAX_ULT_POINTS, player.ultPoints + 1);
  sfxEnemyDeath();
  spawnParticles(enemy.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)), enemy.config.color, 20, 6, 0.8);

  // 同步敌人死亡到联机客户端
  if (isMultiplayer && isHost) {
    sendNetMessage({ type: 'enemy_death', enemyId: enemy.mesh.userData.netId });
  }

  // 自爆兵死亡爆炸
  if (enemy.type === 'bomber') {
    spawnParticles(enemy.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)), 0xff6600, 30, 10, 0.6);
    for (const other of enemies) {
      if (other.dead || other === enemy) continue;
      if (enemy.mesh.position.distanceTo(other.mesh.position) < 4) {
        other.hp -= 15;
        if (other.hp <= 0) killEnemy(other);
      }
    }
    // 检查玩家距离
    if (camera.position.distanceTo(enemy.mesh.position.clone().add(new THREE.Vector3(0, 1, 0))) < 4) {
      damagePlayer(enemy.config.damage * 0.5);
    }
  }

  // 掉落血包 (30%概率)
  if (Math.random() < 0.3) {
    spawnHealthPack(enemy.mesh.position.clone());
  }

  // 击杀提示
  addKillMessage(enemy.config.name, enemy.config.points);

  // 延迟移除
  const mesh = enemy.mesh;
  setTimeout(() => {
    scene.remove(mesh);
    disposeMesh(mesh);
  }, 500);

  updateUI();
  checkWaveComplete();
}

function disposeMesh(mesh) {
  mesh.traverse(child => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) {
        child.material.forEach(m => m.dispose());
      } else {
        child.material.dispose();
      }
    }
  });
}

// 血包
const healthPacks = [];
function spawnHealthPack(pos) {
  const group = new THREE.Group();
  const geo1 = new THREE.BoxGeometry(0.4, 0.1, 0.1);
  const geo2 = new THREE.BoxGeometry(0.1, 0.1, 0.4);
  const mat = new THREE.MeshStandardMaterial({ color: 0x00ff44, emissive: 0x003300, roughness: 0.3 });
  const h1 = new THREE.Mesh(geo1, mat);
  const h2 = new THREE.Mesh(geo2, mat);
  group.add(h1); group.add(h2);
  group.position.copy(pos);
  group.position.y = 1;
  scene.add(group);
  healthPacks.push({ mesh: group, life: 30 });
}

function updateHealthPacks(dt) {
  for (let i = healthPacks.length - 1; i >= 0; i--) {
    const pack = healthPacks[i];
    pack.life -= dt;
    pack.mesh.rotation.y += dt * 2;
    pack.mesh.position.y = 1 + Math.sin(Date.now() * 0.004) * 0.3;

    if (pack.life <= 0) {
      scene.remove(pack.mesh);
      disposeMesh(pack.mesh);
      healthPacks.splice(i, 1);
      continue;
    }

    // 检测玩家拾取
    const dist = camera.position.distanceTo(pack.mesh.position);
    if (dist < 2) {
      player.health = Math.min(MAX_HEALTH, player.health + 25);
      scene.remove(pack.mesh);
      disposeMesh(pack.mesh);
      healthPacks.splice(i, 1);
      updateUI();
      showScreenMsg('+25 HP', '#00ff44');
    }
  }
}

function damagePlayer(damage) {
  player.health -= damage;
  sfxPlayerHurt();
  hitIndicator.classList.add('damage');
  setTimeout(() => hitIndicator.classList.remove('damage'), 150);
  updateUI();

  if (isMultiplayer) {
    sendNetMessage({ type: 'hp_sync', hp: player.health });
  }

  if (player.health <= 0) {
    player.health = 0;
    gameOver();
  }
}

function addKillMessage(name, points) {

  el.className = 'kill-msg';
  el.textContent = `击杀 ${name} +${points}`;

function showScreenMsg(msg, color = '#ffffff') {

}

// ==================== 敌人AI ====================
function updateEnemies(dt) {
  const playerPos = camera.position.clone();

  for (const enemy of enemies) {
    if (enemy.dead) continue;

    const ePos = enemy.mesh.position;
    const toPlayer = playerPos.clone().sub(ePos);
    const distToPlayer = toPlayer.length();
    toPlayer.y = 0;
    const dirToPlayer = toPlayer.clone().normalize();

    // 面向玩家
    if (dirToPlayer.length() > 0.001) {
      const angle = Math.atan2(dirToPlayer.x, dirToPlayer.z);
      enemy.mesh.rotation.y = angle;
    }

    const cfg = enemy.config;

    if (distToPlayer > cfg.range) {
      // 追击
      enemy.state = 'chase';
      const moveSpeed = cfg.speed * dt;
      const newPos = ePos.clone();
      newPos.x += dirToPlayer.x * moveSpeed;
      newPos.z += dirToPlayer.z * moveSpeed;

      // 简单碰撞检测
      if (!checkBuildingCollision(newPos, 0.5)) {
        ePos.x = newPos.x;
        ePos.z = newPos.z;
      } else {
        // 尝试侧向移动
        const sideDir = new THREE.Vector3(-dirToPlayer.z, 0, dirToPlayer.x);
        const altPos = ePos.clone().add(sideDir.clone().multiplyScalar(moveSpeed));
        if (!checkBuildingCollision(altPos, 0.5)) {
          ePos.copy(altPos);
        }
      }
    } else if (enemy.type !== 'medic') {
      // 在射程内：射击（医疗兵不攻击）
      enemy.fireTimer -= dt;
      if (enemy.fireTimer <= 0) {
        enemy.fireTimer = cfg.fireRate * (0.7 + Math.random() * 0.6);
        // 敌人射击
        const muzzlePos = ePos.clone();
        muzzlePos.y += 1.2;
        const aimDir = playerPos.clone().sub(muzzlePos).normalize();
        aimDir.x += (Math.random() - 0.5) * 0.3;
        aimDir.y += (Math.random() - 0.5) * 0.2;
        aimDir.z += (Math.random() - 0.5) * 0.3;
        aimDir.normalize();

        const proj = createProjectile(muzzlePos, aimDir, true);
        proj.userData.damage = cfg.damage;
      }

      // 横向移动
      enemy.strafeTimer -= dt;
      if (enemy.strafeTimer <= 0) {
        enemy.strafeDir = Math.random() > 0.5 ? 1 : -1;
        enemy.strafeTimer = 1 + Math.random() * 2;
      }
      const strafeVec = new THREE.Vector3(-dirToPlayer.z, 0, dirToPlayer.x).multiplyScalar(enemy.strafeDir * cfg.speed * 0.5 * dt);
      const newPos = ePos.clone().add(strafeVec);
      if (!checkBuildingCollision(newPos, 0.5)) {
        ePos.copy(newPos);
      }

      // 保持距离（狙击手更远，医疗兵不后退）
      const minDist = enemy.type === 'sniper' ? cfg.range * 0.75 : enemy.type === 'medic' ? 0 : cfg.range * 0.5;
      if (distToPlayer < minDist) {
        const backSpeed = enemy.type === 'sniper' ? cfg.speed * 0.6 : cfg.speed * 0.3;
        const backPos = ePos.clone().add(dirToPlayer.clone().multiplyScalar(-backSpeed * dt));
        if (!checkBuildingCollision(backPos, 0.5)) {
          ePos.copy(backPos);
        }
      }
    }

    // 医疗兵治疗附近敌人
    if (enemy.type === 'medic' && !enemy.dead) {
      if (!enemy.healTimer) enemy.healTimer = 2;
      enemy.healTimer -= dt;
      if (enemy.healTimer <= 0) {
        enemy.healTimer = 2 + Math.random();
        for (const other of enemies) {
          if (other.dead || other === enemy) continue;
          const d = ePos.distanceTo(other.mesh.position);
          if (d < 5 && other.hp < other.maxHp) {
            other.hp = Math.min(other.maxHp, other.hp + 10);
            spawnParticles(other.mesh.position.clone().add(new THREE.Vector3(0, 1.5, 0)), 0x44ff44, 5, 2, 0.3);
            break;
          }
        }
      }
    }

    // 自爆兵：贴近玩家时爆炸
    if (enemy.type === 'bomber' && distToPlayer < 2.5) {
      spawnParticles(ePos.clone().add(new THREE.Vector3(0, 1, 0)), 0xff4400, 40, 12, 0.8);
      damagePlayer(enemy.config.damage);
      killEnemy(enemy);
      // 附近敌人也受伤
      for (const other of enemies) {
        if (other.dead || other === enemy) continue;
        if (ePos.distanceTo(other.mesh.position) < 4) {
          other.hp -= 15;
          if (other.hp <= 0) killEnemy(other);
        }
      }
      continue;
    }

    // 限制在竞技场内
    const halfA = ARENA_SIZE / 2 - 1;
    ePos.x = Math.max(-halfA, Math.min(halfA, ePos.x));
    ePos.z = Math.max(-halfA, Math.min(halfA, ePos.z));
  }
}

function checkBuildingCollision(pos, radius) {
  for (const b of buildings) {
    const bs = b.userData.size;
    const bp = b.position;
    const halfW = bs.w / 2 + radius;
    const halfD = bs.d / 2 + radius;
    if (Math.abs(pos.x - bp.x) < halfW && Math.abs(pos.z - bp.z) < halfD) {
      return true;
    }
  }
  return false;
}

// ==================== 波次系统 ====================
function startWave(num) {
  waveNumber = num;
  waveActive = true;
  spawnQueue = [];

  // 50种兵种按梯队分组，逐波解锁
  const allKeys = Object.keys(ENEMY_TYPES);
  const t1 = allKeys.slice(0, 10);   // 基础步兵
  const t2 = allKeys.slice(10, 20);  // 高速兵种
  const t3 = allKeys.slice(20, 30);  // 重装坦克
  const t4 = allKeys.slice(30, 40);  // 远程狙击
  const t5 = allKeys.slice(40, 50);  // 特殊异形

  function pick(arr, n) { const s = [...arr].sort(()=>Math.random()-0.5); return s.slice(0, n); }

  let pool = [];
  if (num >= 1) pool = pool.concat(pick(t1, Math.min(6, t1.length)));
  if (num >= 3) pool = pool.concat(pick(t2, Math.min(4, t2.length)));
  if (num >= 5) pool = pool.concat(pick(t3, Math.min(2, t3.length)));
  if (num >= 7) pool = pool.concat(pick(t4, Math.min(3, t4.length)));
  if (num >= 9) pool = pool.concat(pick(t5, Math.min(2, t5.length)));
  if (num >= 12) pool = pool.concat(pick([...t4, ...t5], Math.min(5, t4.length + t5.length)));

  const count = Math.min(5 + num * 2, pool.length);
  const picks = pick([...new Set(pool)], count);
  for (const type of picks) spawnQueue.push(type);

  for (let i = spawnQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [spawnQueue[i], spawnQueue[j]] = [spawnQueue[j], spawnQueue[i]];
  }

  enemiesRemaining = spawnQueue.length;
  spawnTimer = 0;
  spawnInterval = Math.max(0.25, 0.7 - Math.min(num, 15) * 0.03);

  updateUI();
  sfxWaveStart();
  showScreenMsg(`第 ${num} 波 开始！`, '#ffcc00');
  if (isMultiplayer && isHost) {
    sendNetMessage({ type: 'wave_start', wave: num });
  }
}

function checkWaveComplete() {
  if (!waveActive) return;
  if (spawnQueue.length === 0 && enemiesRemaining <= 0) {
    waveActive = false;
    showScreenMsg(`第 ${waveNumber} 波 完成！`, '#00ff44');
    setTimeout(() => {
      if (player.health > 0) {
        startWave(waveNumber + 1);
      }
    }, 2500);
  }
}

function updateSpawning(dt) {
  if (!waveActive || spawnQueue.length === 0) return;

  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    const type = spawnQueue.shift();
    spawnEnemy(type);
    spawnTimer = spawnInterval;
    updateUI();
  }
}

// ==================== 游戏状态 ====================
let gameRunning = false;
let gamePaused = false;

function startGame() {
  player.health = MAX_HEALTH;
  player.score = 0;
  player.position.set(0, PLAYER_HEIGHT, 0);

  camera.rotation.set(0, 0, 0);

  }

    proj.geometry.dispose();
    proj.material.dispose();
  }

  // 清除血包
  for (const pack of healthPacks) {
    scene.remove(pack.mesh);
    disposeMesh(pack.mesh);
  }
  healthPacks.length = 0;

  // 清除粒子
  for (const p of particles) {
    scene.remove(p);
    p.geometry.dispose();
    p.material.dispose();
  }
  particles.length = 0;

  // 清除弹线
  for (const trail of bulletTrails) {
    scene.remove(trail);
    trail.geometry.dispose();
    trail.material.dispose();
  }
  bulletTrails.length = 0;

  // 弹药
  currentAmmo = MAGAZINE_SIZE;
  isReloading = false;
  reloadTimer = 0;
  fireTimer = 0;

  // 武器状态
  currentWeapon = 'gun';
  switchProgress = 0;
  switchTarget = 0;
  knifeAttackTimer = 0;
  knifeStabPhase = 0;
  gunGroup.visible = true;
  knifeGroup.visible = false;
  gunGroup.position.set(GUN_POS_IDLE.x, GUN_POS_IDLE.y, GUN_POS_IDLE.z);
  gunGroup.rotation.x = 0;
  knifeGroup.position.set(KNIFE_POS_HIDDEN.x, KNIFE_POS_HIDDEN.y, KNIFE_POS_HIDDEN.z);

  // 技能状态
  for (const k of ['c', 'q', 'e', 'x']) abilityState[k].timer = 0;
  ultActive = false; ultKnives = 0;
  ultKnifeMeshes.forEach(k => k.visible = false);
  handsGroup.visible = false;
  for (const fk of flyingKnives) { scene.remove(fk); disposeMesh(fk); }
  flyingKnives.length = 0;
  dashTimer = 0; dashVelocity.set(0, 0, 0);
  player.ultPoints = 0;
  for (let i = smokes.length - 1; i >= 0; i--) {
    scene.remove(smokes[i]); smokes[i].geometry.dispose(); smokes[i].material.dispose();
  }
  smokes.length = 0;

  // 清理远程玩家
  for (const [id, rp] of remotePlayers) {
    scene.remove(rp.mesh);
    disposeMesh(rp.mesh);
  }
  remotePlayers.clear();

  startScreen.style.display = 'none';
  gameoverScreen.style.display = 'none';
  gameRunning = true;
  gamePaused = false;

  audioEnabled = true;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // 联机模式不生成AI敌人（纯PvP）
  if (!isMultiplayer) {
    startWave(1);
  }
  updateUI();

  // 锁定鼠标
  renderer.domElement.requestPointerLock();
}

function gameOver() {
  gameRunning = false;
  gamePaused = false;
  document.exitPointerLock();
  gameoverScreen.style.display = 'flex';
  scoreFinal.textContent = `最终得分: ${player.score} | 到达第 ${waveNumber} 波`;
  sfxPlayerHurt();
}

};

// 烟雾弹实体列表
const smokes = [];

function useCloudburst() {
  if (abilityState.c.timer > 0) return;
  abilityState.c.timer = ABILITIES.c.cooldown;

  const dir = camera.getWorldDirection(new THREE.Vector3());
  const origin = camera.position.clone().add(dir.clone().multiplyScalar(1));

  // 烟雾弹投射物
  const smokeGeo = new THREE.SphereGeometry(0.12, 8, 8);
  const smokeMat = new THREE.MeshBasicMaterial({ color: 0x889999, transparent: true, opacity: 0.9 });
  const smokeProj = new THREE.Mesh(smokeGeo, smokeMat);
  smokeProj.position.copy(origin);
  smokeProj.userData = {
    velocity: dir.clone().multiplyScalar(20),
    life: 1.5,
  };
  scene.add(smokeProj);

  // 动画：撞击后爆炸为烟雾球
  const checkSmoke = setInterval(() => {
    smokeProj.userData.life -= 0.05;
    smokeProj.userData.velocity.y -= 8 * 0.05;
    smokeProj.position.add(smokeProj.userData.velocity.clone().multiplyScalar(0.05));

    // 地面/建筑碰撞
    if (smokeProj.position.y < 0.2 || smokeProj.userData.life <= 0) {
      clearInterval(checkSmoke);
      scene.remove(smokeProj);
      smokeProj.geometry.dispose();
      smokeProj.material.dispose();

      // 生成烟雾球
      const cloudGeo = new THREE.SphereGeometry(3, 16, 16);
      const cloudMat = new THREE.MeshBasicMaterial({ color: 0xccddee, transparent: true, opacity: 0.5, depthWrite: false });
      const cloud = new THREE.Mesh(cloudGeo, cloudMat);
      cloud.position.copy(smokeProj.position);
      cloud.position.y = Math.max(cloud.position.y, 1.5);
      cloud.userData = { life: 7, maxLife: 7 };
      scene.add(cloud);
      smokes.push(cloud);

      // 限制烟雾数量
      if (smokes.length > 3) {
        const old = smokes.shift();
        scene.remove(old); old.geometry.dispose(); old.material.dispose();
      }
    }
  }, 30);
}

function useUpdraft() {
  if (abilityState.q.timer > 0) return;
  abilityState.q.timer = ABILITIES.q.cooldown;

  playerVelocity.y = 14; // 比普通跳跃(8)高得多
  player.onGround = false;

  // 脚下风效
  const pPos = camera.position.clone();
  pPos.y -= 1;
  spawnParticles(pPos, 0xaaddff, 25, 4, 0.5);

  playSound(500, 'triangle', 0.15, 0.2, 800);
}

function useTailwind() {
  if (abilityState.e.timer > 0) return;
  abilityState.e.timer = ABILITIES.e.cooldown;

  // 冲刺方向：移动方向优先，否则面朝方向
  const forward = camera.getWorldDirection(new THREE.Vector3()).clone();
  forward.y = 0; forward.normalize();
  const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

  const dashDir = new THREE.Vector3();
  if (keys.w) dashDir.add(forward);
  if (keys.s) dashDir.sub(forward);
  if (keys.a) dashDir.sub(right);
  if (keys.d) dashDir.add(right);
  if (dashDir.length() < 0.1) dashDir.copy(forward);
  dashDir.normalize();

  dashVelocity.copy(dashDir.multiplyScalar(DASH_SPEED));
  dashTimer = DASH_DURATION;

  // 风效尾迹
  for (let i = 0; i < 10; i++) {
    spawnParticles(camera.position.clone(), 0xaaddff, 3, 2, 0.3);
  }
  playSound(300, 'sawtooth', 0.1, 0.15, 600);
}

  let visualSource = null;
  for (let i = ultKnifeMeshes.length - 1; i >= 0; i--) {
    if (ultKnifeMeshes[i].visible) { visualSource = ultKnifeMeshes[i]; break; }
  }

  // 即时射线判定
  const dir = camera.getWorldDirection(new THREE.Vector3()).clone();
  bulletRay.set(camera.position, dir);
  const { meshes: hitMeshes, meshToOwner } = getHitTargets();
  const intersects = bulletRay.intersectObjects([...buildings, ...hitMeshes], false);

  let killed = false;
  let hitPoint = null;
  if (intersects.length > 0 && intersects[0].distance < 100) {
    hitPoint = intersects[0].point.clone();
    const hitObj = intersects[0].object;
    const owner = meshToOwner.get(hitObj);
    if (owner) {
      const isHeadshot = hitObj.userData.isHead === true;
      const dmg = isHeadshot ? 70 : 45;
      if (isHeadshot) {
        spawnParticles(hitPoint, 0xffff00, 30, 12, 0.8);
        addKillMessage('⚔️飞刀爆头!', 0);
      } else {
        spawnParticles(hitPoint, 0x88ccff, 20, 6, 0.5);
      }
      if (owner.type === 'player') {
        sendNetMessage({ type: 'player_hit', target: owner.id, dmg, isHeadshot, hitX: hitPoint.x, hitY: hitPoint.y, hitZ: hitPoint.z });
      } else {
        const wasDead = owner.obj.dead;
        damageEnemy(owner.obj, dmg);
        if (!wasDead && owner.obj.dead) killed = true;
      }
    } else {
      spawnParticles(hitPoint, 0x88ccff, 8, 3, 0.3);
    }
  }

  // 显示隐藏对应数量的飞刀（仅当没击杀时少一把）
  if (killed) {
    ultKnives = MAX_ULT_KNIVES;
    ultKnifeMeshes.forEach(k => k.visible = true);
    showScreenMsg('⚔️ 飞刀补满！', '#88ccff');
  } else {
    // 没击杀：正常减少一把显示
    if (visualSource) visualSource.visible = false;
  }

  if (ultKnives <= 0) endBladeStorm();
  updateAbilityUI();
  updateUI();

  // --- 视觉动画（用副本，不碰显示飞刀） ---
  if (visualSource) {
    const knifeWorldPos = new THREE.Vector3();
    visualSource.getWorldPosition(knifeWorldPos);
    const flyKnife = visualSource.clone();
    flyKnife.position.copy(knifeWorldPos);
    flyKnife.visible = true;
    scene.add(flyKnife);
    const target = hitPoint || camera.position.clone().add(dir.clone().multiplyScalar(100));
    flyKnife.userData = {
      velocity: dir.clone().multiplyScalar(60),
      life: 0.8,
      spinSpeed: 20 + Math.random() * 10,
      target: target,
    };
    flyingKnives.push(flyKnife);
  }
}

function updateFlyingKnives(dt) {
  for (let i = flyingKnives.length - 1; i >= 0; i--) {
    const fk = flyingKnives[i];
    fk.userData.life -= dt;

    const toTarget = fk.userData.target.clone().sub(fk.position);
    const dist = toTarget.length();
    if (dist < 0.3 || fk.userData.life <= 0) {
      scene.remove(fk); disposeMesh(fk); flyingKnives.splice(i, 1); continue;
    }
    fk.position.add(toTarget.normalize().multiplyScalar(Math.min(60 * dt, dist)));
    fk.rotation.z += fk.userData.spinSpeed * dt;
    fk.rotation.x += fk.userData.spinSpeed * 0.3 * dt;
  }
}

function endBladeStorm() {
  ultActive = false;
  ultKnifeMeshes.forEach(k => k.visible = false);
  handsGroup.visible = false;
  // 重置武器切换和动画状态
  switchProgress = 0; switchTarget = 0;
  recoilOffset = 0;
  if (currentWeapon === 'gun') {
    gunGroup.visible = true;
    knifeGroup.visible = false;
    gunGroup.position.set(GUN_POS_IDLE.x, GUN_POS_IDLE.y, GUN_POS_IDLE.z);
    gunGroup.rotation.x = 0;
  } else {
    gunGroup.visible = false;
    knifeGroup.visible = true;
    knifeGroup.position.set(KNIFE_POS_ACTIVE.x, KNIFE_POS_ACTIVE.y, KNIFE_POS_ACTIVE.z);
  }
  showScreenMsg('飞刀用完', '#ff8844');
}

function updateAbilities(dt) {
  // 冷却计时
  for (const key of ['c', 'q', 'e']) {
    if (abilityState[key].timer > 0) {
      abilityState[key].timer = Math.max(0, abilityState[key].timer - dt);
    }
  }
  // 飞刀风暴不自动冷却

  // 冲刺物理
  if (dashTimer > 0) {
    dashTimer -= dt;
    camera.position.x += dashVelocity.x * dt;
    camera.position.z += dashVelocity.z * dt;
    if (dashTimer <= 0) {
      dashVelocity.set(0, 0, 0);
    }
    // 碰撞检测
    const halfA = ARENA_SIZE / 2 - 2;
    camera.position.x = Math.max(-halfA, Math.min(halfA, camera.position.x));
    camera.position.z = Math.max(-halfA, Math.min(halfA, camera.position.z));
    if (checkBuildingCollision(new THREE.Vector3(camera.position.x, PLAYER_HEIGHT, camera.position.z), PLAYER_RADIUS)) {
      camera.position.x -= dashVelocity.x * dt;
      camera.position.z -= dashVelocity.z * dt;
      dashTimer = 0;
      dashVelocity.set(0, 0, 0);
    }
  }

  // 烟雾弹生命周期
  for (let i = smokes.length - 1; i >= 0; i--) {
    const s = smokes[i];
    s.userData.life -= dt;
    const alpha = Math.max(0, s.userData.life / s.userData.maxLife);
    s.material.opacity = alpha * 0.45;
    s.scale.setScalar(1 + (1 - alpha) * 0.5);
    if (s.userData.life <= 0) {
      scene.remove(s);
      s.geometry.dispose();
      s.material.dispose();
      smokes.splice(i, 1);
    }
  }

  updateAbilityUI();
}

function updateAbilityUI() {
  const container = document.getElementById('abilities-hud');
  if (!container) return;
  const keys = ['c', 'q', 'e', 'x'];
  keys.forEach(k => {
    const el = document.getElementById('abil-' + k);
    if (!el) return;
    const cfg = ABILITIES[k];
    let ready, cdPct;
    if (k === 'x') {
      ready = player.ultPoints >= MAX_ULT_POINTS;
      cdPct = player.ultPoints / MAX_ULT_POINTS;
    } else {
      ready = abilityState[k].timer <= 0;
      cdPct = abilityState[k].timer > 0 ? 1 - abilityState[k].timer / cfg.cooldown : 1;
    }
    el.style.background = ready
      ? (k === 'x' ? 'rgba(100,180,255,0.7)' : 'rgba(80,80,80,0.7)')
      : 'rgba(40,40,40,0.5)';
    el.style.borderColor = ready ? (k === 'x' ? '#66aaff' : '#ffffff') : '#444444';
    el.querySelector('.abil-fill').style.height = (cdPct * 100) + '%';
    if (k === 'x') {
      el.querySelector('.abil-label').textContent = ultActive ? ultKnives : Math.floor(player.ultPoints);
    } else {
      el.querySelector('.abil-label').textContent = abilityState[k].timer > 0 ? Math.ceil(abilityState[k].timer) : '✓';
    }
  });
}

// ==================== 武器状态 ====================
let currentAmmo = MAGAZINE_SIZE;
let isReloading = false;
let reloadTimer = 0;
let fireTimer = 0;

function getEnemyHitTargets() {
  const meshes = [];
  const meshToEnemy = new Map();
  for (const enemy of enemies) {
    if (enemy.dead) continue;
    enemy.mesh.traverse(child => {
      if (child.isMesh) {
        meshes.push(child);
        meshToEnemy.set(child, enemy);
      }
    });
  }
  return { meshes, meshToEnemy };
}

function getHitTargets() {
  const meshes = [];
  const meshToOwner = new Map();
  // AI敌人
  for (const enemy of enemies) {
    if (enemy.dead) continue;
    enemy.mesh.traverse(child => {
      if (child.isMesh) {
        meshes.push(child);
        meshToOwner.set(child, { type: 'enemy', obj: enemy });
      }
    });
  }
  // 远程玩家
  for (const [id, rp] of remotePlayers) {
    rp.mesh.traverse(child => {
      if (child.isMesh && child.userData.isPlayerBody) {
        meshes.push(child);
        meshToOwner.set(child, { type: 'player', id, rp });
      }
    });
  }
  return { meshes, meshToOwner };
}

function shoot() {
  if (!gameRunning || gamePaused) return;
  if (isReloading) return;
  if (fireTimer > 0) return;
  if (currentAmmo <= 0) {
    reload();
    return;
  }

  currentAmmo--;
  fireTimer = FIRE_COOLDOWN;

  // 后坐力
  recoilOffset = 0.05;
  recoilRecovery = 0;

  // 枪口闪光
  triggerMuzzleFlash();

  // 音效
  sfxShoot();

  // 弹壳弹出
  ejectCasing();

  // 屏幕震动
  triggerScreenShake(0.008, 0.08);

  // 枪口位置（用于弹道拖尾的视觉起点）
  const muzzleWorldPos = new THREE.Vector3();
  gunBarrel.getWorldPosition(muzzleWorldPos);
  const shootDir = camera.getWorldDirection(new THREE.Vector3()).clone();

  // 子弹散布基于玩家速度：越快越不准
  // 静止散布 0.003 rad，全速跑动 0.05 rad，跳跃额外 +0.015
  let spreadAngle = 0.003 + (playerSpeed / PLAYER_SPEED) * 0.047;
  if (!player.onGround) spreadAngle += 0.015;
  if (spreadAngle > 0.003) {
    shootDir.x += (Math.random() - 0.5) * spreadAngle * 2;
    shootDir.y += (Math.random() - 0.5) * spreadAngle * 2;
    shootDir.z += (Math.random() - 0.5) * spreadAngle * 2;
    shootDir.normalize();
  }

  // 射线从相机（准星中心）发射，保证准星指向即命中
  const cameraOrigin = camera.position.clone();
  bulletRay.set(cameraOrigin, shootDir);

  // 收集所有可命中目标（AI敌人 + 远程玩家）
  const { meshes: hitMeshes, meshToOwner } = getHitTargets();
  const allTargets = [...buildings, ...hitMeshes];
  const intersects = bulletRay.intersectObjects(allTargets, false);

  let hitPoint;
  let hitEnemy = null;
  let hitPlayerId = null;

  if (intersects.length > 0 && intersects[0].distance < BULLET_RANGE) {
    hitPoint = intersects[0].point;
    const hitObj = intersects[0].object;

    const owner = meshToOwner.get(hitObj);
    if (owner) {
      if (owner.type === 'player') {
        // 命中远程玩家
        hitPlayerId = owner.id;
        const isHeadshot = hitObj.userData.isHead === true;
        const dmg = isHeadshot ? BULLET_DAMAGE * HEADSHOT_MULTIPLIER : BULLET_DAMAGE;
        if (isHeadshot) {
          spawnParticles(hitPoint, 0xffff00, 20, 8, 0.6);
          addKillMessage('💀爆头!', 0);
        } else {
          spawnParticles(hitPoint, 0xff4444, 10, 5, 0.4);
        }
        sendNetMessage({ type: 'player_hit', target: hitPlayerId, dmg, isHeadshot, hitX: hitPoint.x, hitY: hitPoint.y, hitZ: hitPoint.z });
        if (isMultiplayer) notifyShoot(muzzleWorldPos, shootDir, null, hitPoint, dmg);
      } else {
        // 命中AI敌人
        hitEnemy = owner.obj;
        const isHeadshot = hitObj.userData.isHead === true;
        const dmg = isHeadshot ? BULLET_DAMAGE * HEADSHOT_MULTIPLIER : BULLET_DAMAGE;
        if (isHeadshot) {
          spawnParticles(hitPoint, 0xffff00, 20, 8, 0.6);
          addKillMessage('💀爆头!', 0);
        } else {
          spawnParticles(hitPoint, 0xff4444, 10, 5, 0.4);
        }
        damageEnemy(hitEnemy, dmg);
        if (isMultiplayer) notifyShoot(muzzleWorldPos, shootDir, hitEnemy, hitPoint, dmg);
      }
    } else {
      spawnParticles(hitPoint, 0xffcc88, 8, 4, 0.3);
      if (intersects[0].face) {
        addBulletHole(hitPoint, intersects[0].face.normal.clone());
      }
      if (isMultiplayer) notifyShoot(muzzleWorldPos, shootDir, null, null, 0);
    }
  } else {
    hitPoint = cameraOrigin.clone().add(
      shootDir.multiplyScalar(BULLET_RANGE)
    );
    if (isMultiplayer) notifyShoot(muzzleWorldPos, shootDir, null, null, 0);
  }

  // 弹道拖尾从枪口画到命中点（视觉效果），但命中判定基于准星射线
  createBulletTrail(muzzleWorldPos, hitPoint);

  updateUI();

  if (currentAmmo <= 0) {
    setTimeout(() => { if (gameRunning) reload(); }, 300);
  }
}

let reloadAnimProgress = 0;
const GUN_POS_IDLE = { x: 0.30, y: -0.24, z: -0.55 };
const GUN_POS_RELOAD = { x: 0.30, y: -0.42, z: -0.38 };
const GUN_ROT_RELOAD = 0.6;

function knifeAttack() {
  if (!gameRunning || gamePaused) return;
  if (knifeAttackTimer > 0) return;
  if (knifeStabPhase > 0) return;

  knifeAttackTimer = KNIFE_ATTACK_COOLDOWN;
  knifeStabPhase = 0.3;

  const forward = camera.getWorldDirection(new THREE.Vector3()).clone();
  forward.y = 0; forward.normalize();
  const origin = camera.position.clone();

  // 检测前方敌人和远程玩家（水平面判定，忽略 Y 轴高度差）
  let bestTarget = null; // { type: 'enemy'|'player', obj, id }
  let bestDist = KNIFE_RANGE;

  // 检测AI敌人
  for (const enemy of enemies) {
    if (enemy.dead) continue;
    const enemyCenter = enemy.mesh.position.clone();
    enemyCenter.y += 1.1;
    const toTarget = enemyCenter.clone().sub(origin);
    toTarget.y = 0;
    const projDist = toTarget.dot(forward);
    if (projDist < 0 || projDist > KNIFE_RANGE) continue;
    const perpDist = toTarget.clone().sub(forward.clone().multiplyScalar(projDist)).length();
    if (perpDist < 1.5 && projDist < bestDist) {
      bestDist = projDist;
      bestTarget = { type: 'enemy', obj: enemy };
    }
  }

  // 检测远程玩家
  for (const [id, rp] of remotePlayers) {
    const pCenter = new THREE.Vector3(rp.mesh.position.x, 1.1, rp.mesh.position.z);
    const toTarget = pCenter.clone().sub(origin);
    toTarget.y = 0;
    const projDist = toTarget.dot(forward);
    if (projDist < 0 || projDist > KNIFE_RANGE) continue;
    const perpDist = toTarget.clone().sub(forward.clone().multiplyScalar(projDist)).length();
    if (perpDist < 1.5 && projDist < bestDist) {
      bestDist = projDist;
      bestTarget = { type: 'player', id };
    }
  }

  if (bestTarget) {
    const isHeadshot = Math.random() < 0.3;
    const dmg = isHeadshot ? KNIFE_DAMAGE * 2 : KNIFE_DAMAGE;
    const hitPoint = origin.clone().add(forward.clone().multiplyScalar(bestDist));
    if (isHeadshot) {
      spawnParticles(hitPoint, 0xffff00, 20, 8, 0.6);
      addKillMessage('🔪爆头!', 0);
    } else {
      spawnParticles(hitPoint, 0xff0000, 15, 5, 0.4);
    }
    if (bestTarget.type === 'player') {
      sendNetMessage({ type: 'player_hit', target: bestTarget.id, dmg, isHeadshot, hitX: hitPoint.x, hitY: hitPoint.y, hitZ: hitPoint.z });
    } else {
      damageEnemy(bestTarget.obj, dmg);
    }
    if (isMultiplayer) notifyKnife(origin, forward, null, hitPoint, dmg);
    triggerScreenShake(0.015, 0.1);
    playSound(200, 'sawtooth', 0.08, 0.1, 40);
  } else {
    if (isMultiplayer) notifyKnife(origin, forward, null, null, 0);
    playSound(100, 'triangle', 0.06, 0.06, 50);
  }
}

function reload() {
  if (isReloading || currentAmmo === MAGAZINE_SIZE) return;
  isReloading = true;
  reloadAnimProgress = 0;
  reloadTimer = RELOAD_TIME;
  sfxReload();
  showScreenMsg('换弹中...', '#ffaa00');
}

function finishReload() {
  currentAmmo = MAGAZINE_SIZE;
  isReloading = false;
  reloadAnimProgress = 0;
  updateUI();
}

// ==================== 小地图 ====================
function updateMinimap() {
  const w = 180, h = 180;
  minimapCtx.clearRect(0, 0, w, h);

  // 背景
  minimapCtx.fillStyle = 'rgba(0,0,0,0.6)';
  minimapCtx.beginPath();
  minimapCtx.arc(90, 90, 88, 0, Math.PI * 2);
  minimapCtx.fill();

  const scale = 0.85;
  const cx = 90, cy = 90;

  // 建筑
  minimapCtx.fillStyle = 'rgba(150,150,150,0.6)';
  for (const b of buildings) {
    const bs = b.userData.size;
    const bx = cx + b.position.x * scale;
    const by = cy + b.position.z * scale;
    minimapCtx.fillRect(bx - bs.w * scale / 2, by - bs.d * scale / 2, bs.w * scale, bs.d * scale);
  }

  // 敌人
  for (const enemy of enemies) {
    if (enemy.dead) continue;
    const ex = cx + enemy.mesh.position.x * scale;
    const ey = cy + enemy.mesh.position.z * scale;
    minimapCtx.fillStyle = enemy.type === 'tank' ? '#cc33ff' : enemy.type === 'runner' ? '#ff8800' : '#ff3333';
    minimapCtx.beginPath();
    minimapCtx.arc(ex, ey, 2.5, 0, Math.PI * 2);
    minimapCtx.fill();
  }

  // 血包
  for (const pack of healthPacks) {
    const px = cx + pack.mesh.position.x * scale;
    const py = cy + pack.mesh.position.z * scale;
    minimapCtx.fillStyle = '#00ff44';
    minimapCtx.beginPath();
    minimapCtx.arc(px, py, 1.5, 0, Math.PI * 2);
    minimapCtx.fill();
  }

  // 本机玩家
  const px = cx + camera.position.x * scale;
  const pz = cy + camera.position.z * scale;
  minimapCtx.fillStyle = '#00ccff';
  minimapCtx.beginPath();
  minimapCtx.arc(px, pz, 3, 0, Math.PI * 2);
  minimapCtx.fill();

  // 本机玩家朝向
  const dir = camera.getWorldDirection(new THREE.Vector3());
  minimapCtx.strokeStyle = '#00ccff';
  minimapCtx.lineWidth = 2;
  minimapCtx.beginPath();
  minimapCtx.moveTo(px, pz);
  minimapCtx.lineTo(px + dir.x * 8, pz + dir.z * 8);
  minimapCtx.stroke();

  // 远程玩家
  for (const [id, rp] of remotePlayers) {
    const rx = cx + rp.pos.x * scale;
    const rz = cy + rp.pos.z * scale;
    minimapCtx.fillStyle = '#ff4444';
    minimapCtx.beginPath();
    minimapCtx.arc(rx, rz, 3, 0, Math.PI * 2);
    minimapCtx.fill();
    // 朝向
    const rdir = new THREE.Vector3(Math.sin(rp.yaw), 0, Math.cos(rp.yaw));
    minimapCtx.strokeStyle = '#ff4444';
    minimapCtx.beginPath();
    minimapCtx.moveTo(rx, rz);
    minimapCtx.lineTo(rx + rdir.x * 8, rz + rdir.z * 8);
    minimapCtx.stroke();
  }
}

// ==================== 输入处理 ====================
document.addEventListener('keydown', (e) => {
  if (!gameRunning) return;
  switch (e.code) {
    case 'KeyW': keys.w = true; break;
    case 'KeyA': keys.a = true; break;
    case 'KeyS': keys.s = true; break;
    case 'KeyD': keys.d = true; break;
    case 'Space': keys.space = true; break;
    case 'KeyR':
      if (!isReloading && !ultActive) reload();
      break;
    case 'KeyC':
      useCloudburst();
      break;
    case 'KeyQ':
      useUpdraft();
      break;
    case 'KeyE':
      useTailwind();
      break;
    case 'KeyX':
      if (player.ultPoints >= MAX_ULT_POINTS || ultActive) activateBladeStorm();
      break;
    case 'Escape':
      gamePaused = !gamePaused;
      if (gamePaused) {
        document.exitPointerLock();
        showScreenMsg('已暂停', '#ffffff');
      } else {
        renderer.domElement.requestPointerLock();
        showScreenMsg('继续', '#ffffff');
      }
      break;
  }
});

document.addEventListener('keyup', (e) => {
  switch (e.code) {
    case 'KeyW': keys.w = false; break;
    case 'KeyA': keys.a = false; break;
    case 'KeyS': keys.s = false; break;
    case 'KeyD': keys.d = false; break;
    case 'Space': keys.space = false; break;
  }
});

document.addEventListener('mousedown', (e) => {
  if (e.button === 0 && gameRunning && !gamePaused && document.pointerLockElement) {
    if (ultActive) {
      throwUltKnife();
    } else if (currentWeapon === 'knife') {
      knifeAttack();
    } else {
      shoot();
    }
  }
});

// 滚轮切换武器（大招期间禁用）
document.addEventListener('wheel', (e) => {
  if (!gameRunning || gamePaused || ultActive) return;
  if (isReloading) return;
  if (e.deltaY > 0) {
    switchWeapon('knife');
  } else {
    switchWeapon('gun');
  }
});

// 鼠标视角控制
let yaw = 0, pitch = 0;
const mouseSensitivity = 0.002;
document.addEventListener('mousemove', (e) => {
  if (!gameRunning || gamePaused) return;
  if (!document.pointerLockElement) return;
  yaw -= e.movementX * mouseSensitivity;
  pitch -= e.movementY * mouseSensitivity;
  pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
});

document.addEventListener('pointerlockchange', () => {
  if (!document.pointerLockElement && gameRunning && !gamePaused) {
    if (player.health > 0) {
      gamePaused = true;
      showScreenMsg('点击继续', '#ffffff');
    }
  }
});

// ==================== 多人联机 ====================
let isMultiplayer = false;
let isHost = false;
let ws = null;
let remotePlayers = new Map();
let netSyncTimer = 0;
const NET_SYNC_RATE = 0.066; // 15Hz
let pendingEnemyState = [];
let myPlayerId = '';

function createRemotePlayerMesh(playerId) {
  const g = new THREE.Group();
  g.userData.isRemotePlayer = true;
  g.userData.playerId = playerId;
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xeebb99, roughness: 0.6 });
  const armorMat = new THREE.MeshStandardMaterial({ color: 0x3388dd, roughness: 0.4, metalness: 0.4 });
  const pantMat = new THREE.MeshStandardMaterial({ color: 0x223355, roughness: 0.7 });
  const gunMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.8 });

  // 腿部
  const upLegGeo = new THREE.CylinderGeometry(0.11, 0.12, 0.4, 6);
  const loLegGeo = new THREE.CylinderGeometry(0.09, 0.1, 0.35, 6);
  const bootGeo = new THREE.BoxGeometry(0.14, 0.08, 0.2);
  const bootMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
  [[-0.14, 0], [0.14, 0]].forEach(([lx, lz]) => {
    const ul = new THREE.Mesh(upLegGeo, pantMat); ul.position.set(lx, 0.55, lz); ul.castShadow = true; g.add(ul);
    const ll = new THREE.Mesh(loLegGeo, pantMat); ll.position.set(lx, 0.2, lz); ll.castShadow = true; g.add(ll);
    g.add(new THREE.Mesh(bootGeo, bootMat)).position.set(lx, 0.04, lz + 0.04);
  });

  // 胯
  const hip = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.15, 0.25), pantMat);
  hip.position.y = 0.78; hip.castShadow = true; g.add(hip);

  // 躯干
  const chest = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.4, 0.32), armorMat);
  chest.position.y = 1.1; chest.castShadow = true; g.add(chest);
  const abs = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 0.28), armorMat);
  abs.position.y = 0.8; abs.castShadow = true; g.add(abs);

  // 肩
  const shGeo = new THREE.SphereGeometry(0.13, 6, 6);
  [[-0.35, 1.38], [0.35, 1.38]].forEach(([sx, sy]) => {
    g.add(new THREE.Mesh(shGeo, armorMat)).position.set(sx, sy, 0);
  });

  // 手臂
  const upArmGeo = new THREE.CylinderGeometry(0.07, 0.08, 0.3, 6);
  const loArmGeo = new THREE.CylinderGeometry(0.06, 0.07, 0.28, 6);
  const handGeo = new THREE.BoxGeometry(0.08, 0.06, 0.1);
  [[-0.4, 0], [0.4, 0]].forEach(([ax, az]) => {
    g.add(new THREE.Mesh(upArmGeo, armorMat)).position.set(ax, 1.2, az);
    g.add(new THREE.Mesh(loArmGeo, armorMat)).position.set(ax, 0.92, az);
    g.add(new THREE.Mesh(handGeo, skinMat)).position.set(ax, 0.72, az);
  });

  // 武器
  const wb = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.02, 0.22, 6), gunMat);
  wb.rotation.x = Math.PI / 2; wb.position.set(0.42, 1.18, 0.15); g.add(wb);
  g.add(new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.07, 0.12), gunMat)).position.set(0.4, 1.15, 0.06);

  // 颈
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, 0.08, 6), skinMat);
  neck.position.y = 1.5; neck.userData.isHead = true; g.add(neck);

  // 头
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 8), skinMat);
  head.position.y = 1.68; head.castShadow = true; head.userData.isHead = true; g.add(head);

  // 头盔
  const helm = new THREE.Mesh(
    new THREE.SphereGeometry(0.23, 10, 8, 0, Math.PI * 2, 0, Math.PI * 0.6),
    new THREE.MeshStandardMaterial({ color: 0x3388dd, roughness: 0.4, metalness: 0.6 })
  ); helm.position.y = 1.72; helm.userData.isHead = true; g.add(helm);

  // 护目镜
  const visor = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.06, 0.06),
    new THREE.MeshBasicMaterial({ color: 0x44ddff }));
  visor.position.set(0, 1.7, 0.2); visor.userData.isHead = true; g.add(visor);

  // 名字
  const nc = document.createElement('canvas'); nc.width = 128; nc.height = 32;
  const nctx = nc.getContext('2d');
  nctx.fillStyle = '#44ff44'; nctx.font = 'bold 18px Arial'; nctx.textAlign = 'center';
  nctx.fillText(playerId, 64, 20);
